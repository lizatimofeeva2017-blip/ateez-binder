<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ATEEZ Binder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..600&family=Lora:ital,wght@0,600;1,600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #E8E8ED;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 0; margin: 0;
    }
    .app-container {
      width: 100%; max-width: 420px; background: #F6F6F8;
      box-shadow: 0 0 40px rgba(0,0,0,0.08); overflow: hidden;
      display: flex; flex-direction: column; height: 100vh; max-height: 820px;
    }
    .header {
      background: #FFFFFF; padding: 14px 16px; color: #2B2B2B;
      font-weight: 600; font-size: 1rem; display: flex;
      align-items: center; justify-content: space-between; flex-shrink: 0;
      border-bottom: 1px solid rgba(0,0,0,0.04); font-family: 'Lora', serif;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .back-btn {
      background: none; border: none; color: #D3542B; font-size: 1rem;
      font-weight: 500; cursor: pointer; padding: 4px 8px; border-radius: 8px;
    }
    .main-content {
      flex: 1; overflow-y: auto; padding: 12px; background: #F6F6F8;
      -webkit-overflow-scrolling: touch;
    }
    .bottom-nav {
      display: flex; justify-content: space-around; align-items: center;
      background: #FFFFFF; border-top: 1px solid rgba(0,0,0,0.04);
      padding: 8px 0 12px; flex-shrink: 0; overflow-x: auto;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px; color: #A1A1AA; font-size: 0.6rem; font-weight: 500;
      cursor: pointer; padding: 4px 8px; border-radius: 14px; transition: 0.2s;
      position: relative; white-space: nowrap;
    }
    .nav-item.active { color: #D3542B; background: rgba(211,84,43,0.08); }
    .nav-icon { font-size: 1.3rem; line-height: 1; }
    .badge {
      background: #D3542B; color: #FFFFFF; border-radius: 10px;
      padding: 0 5px; font-size: 0.55rem; font-weight: 600;
      position: absolute; top: -2px; right: -2px;
    }
    .btn {
      background: #D3542B; border: none; padding: 8px 14px;
      border-radius: 16px; font-weight: 600; font-size: 0.75rem;
      color: #FFFFFF; cursor: pointer; transition: 0.2s;
    }
    .btn.small { padding: 4px 10px; font-size: 0.7rem; }
    .btn.outline { background: transparent; border: 1px solid #D3542B; color: #D3542B; }
    .dialog {
      background: #FFFFFF; border-radius: 22px; padding: 24px;
      width: 90%; max-width: 340px; color: #2B2B2B;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      max-height: 80vh; overflow-y: auto;
    }
    .dialog h4 { font-family: 'Lora', serif; font-size: 1rem; margin-bottom: 12px; }
    .input-field {
      width: 100%; margin: 4px 0; padding: 8px; border-radius: 12px;
      border: 1px solid #E0E0E0; font-size: 0.8rem;
    }
    .chip-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0; }
    .chip-select {
      padding: 6px 12px; border-radius: 20px; font-size: 0.7rem;
      background: #F6F6F8; color: #2B2B2B; cursor: pointer;
      border: 1px solid rgba(0,0,0,0.04);
    }
    .chip-select.active { background: #D3542B; color: #FFFFFF; border-color: #D3542B; }
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #2B2B2B; color: #FFFFFF; padding: 12px 24px;
      border-radius: 20px; font-size: 0.8rem; z-index: 200;
    }
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .card-cell {
      background: #FFFFFF; border-radius: 16px; padding: 12px;
      color: #2B2B2B; font-size: 0.8rem; cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04); transition: 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .feed-item {
      background: #FFFFFF; border-radius: 18px; overflow: hidden;
      margin-bottom: 12px; box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }
    .feed-item .info { padding: 12px; color: #2B2B2B; font-size: 0.8rem; }
    .stat-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .stat-box {
      flex: 1; background: #FFFFFF; border-radius: 14px;
      padding: 10px; text-align: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }
    .stat-box .stat-num { font-size: 1.2rem; font-weight: 600; }
    .stat-box .stat-label { font-size: 0.6rem; color: #A1A1AA; margin-top: 2px; }
    .widget-row { display: flex; gap: 8px; margin: 10px 0; }
    .widget-card {
      flex: 1; background: #FFFFFF; border-radius: 14px;
      padding: 10px; text-align: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.03);
    }
    .widget-card .widget-number { font-size: 1.3rem; font-weight: 700; }
    .widget-card .widget-label { font-size: 0.6rem; color: #A1A1AA; margin-top: 2px; }
    .big-transit-banner {
      background: #D3542B; color: #FFFFFF; border-radius: 16px;
      padding: 16px; text-align: center; margin-bottom: 12px;
      font-size: 1rem; font-weight: 600;
    }
    .finance-block {
      background: #FFFFFF; border-radius: 16px;
      padding: 12px; margin-bottom: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }
    .finance-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .finance-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.75rem; color: #2B2B2B; }
    .collapse-icon { transition: transform 0.3s; font-size: 0.9rem; color: #A1A1AA; }
    .collapse-icon.open { transform: rotate(180deg); }
    .section-title { color: #2B2B2B; font-family: 'Lora', serif; font-size: 0.85rem; margin: 10px 0 6px; }
    .search-input {
      width: 100%; padding: 10px; border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.06); background: #FFFFFF;
      font-size: 0.8rem; margin-bottom: 10px;
    }
    .custom-card-images { display: flex; gap: 4px; flex-shrink: 0; }
    .custom-card-image-small {
      width: 40px; height: 60px; border-radius: 8px;
      background-size: cover; background-position: center;
      background-color: #F6F6F8;
    }
    .add-form {
      background: #FFFFFF; border-radius: 16px; padding: 14px;
      margin-bottom: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }
    @media (max-width: 400px) {
      .nav-item { padding: 2px 4px; font-size: 0.55rem; }
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body>
<div class="app-container" id="app">
  <div class="header" id="header">
    <div class="header-left"><span class="header-title">🏴‍☠️ ATEEZ BINDER</span></div>
    <div id="headerAction"><span class="material-symbols-outlined" style="cursor:pointer;">settings</span></div>
  </div>
  <div class="main-content" id="mainContent"></div>
  <div class="bottom-nav" id="bottomNav"></div>
</div>

<script>
  const STATE = {
    activeTab: 'home',
    cards: [],
    wishlist: [],
    recentActions: [],
    financeExpanded: true,
    cardFilter: 'all',
    cardSearch: '',
    cardGroupFilter: 'all',
    showAddForm: false
  };

  const GROUPS = {
    "ATEEZ": {
      members: ["Hongjoong","Seonghwa","Yunho","Yeosang","San","Mingi","Wooyoung","Jongho"],
      albums: ["Golden Hour Pt.1","Golden Hour Pt.2","Golden Hour Pt.3","Golden Hour Pt.4","THE WORLD EP.FIN : WILL","THE WORLD EP.2 : OUTLAW"]
    },
    "Stray Kids": {
      members: ["Bang Chan","Lee Know","Changbin","Hyunjin","Han","Felix","Seungmin","I.N"],
      albums: ["5-STAR","ROCK-STAR","ATE","MAXIDENT","ODDINARY"]
    },
    "GOT7": {
      members: ["Jay B","Mark","Jackson","Jinyoung","Youngjae","BamBam","Yugyeom"],
      albums: ["GOT7","Winter Heptagon","DYE","Breath of Love : Last Piece"]
    },
    "TXT": {
      members: ["Yeonjun","Soobin","Beomgyu","Taehyun","Huening Kai"],
      albums: ["The Dream Chapter: STAR","minisode 3: TOMORROW","The Name Chapter: FREEFALL"]
    },
    "ENHYPEN": {
      members: ["Jungwon","Heeseung","Jay","Jake","Sunghoon","Sunoo","Ni-ki"],
      albums: ["ROMANCE : UNTOLD","MANIFESTO : DAY 1","DIMENSION : DILEMMA"]
    },
    "BTS": {
      members: ["RM","Jin","Suga","J-Hope","Jimin","V","Jungkook"],
      albums: ["BE","Proof","Map of the Soul: 7","Love Yourself: Answer"]
    },
    "SEVENTEEN": {
      members: ["S.Coups","Wonwoo","Mingyu","Vernon","Jeonghan","Joshua","Woozi","DK","Seungkwan","Dino","Hoshi","Jun","The8"],
      albums: ["17 IS RIGHT HERE","SEVENTEENTH HEAVEN","Face the Sun","Attacca"]
    }
  };

  function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

  function loadState() {
    const saved = localStorage.getItem('ateez_binder_final');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        STATE.cards = parsed.cards || [];
        STATE.wishlist = parsed.wishlist || [];
        STATE.recentActions = parsed.recentActions || [];
        STATE.financeExpanded = parsed.financeExpanded !== undefined ? parsed.financeExpanded : true;
        STATE.cardFilter = parsed.cardFilter || 'all';
        STATE.cardSearch = parsed.cardSearch || '';
        STATE.cardGroupFilter = parsed.cardGroupFilter || 'all';
        STATE.showAddForm = false;
      } catch(e) {}
    }
  }

  function saveState() {
    localStorage.setItem('ateez_binder_final', JSON.stringify(STATE));
  }

  function addRecentAction(text) {
    STATE.recentActions.unshift({ text, date: new Date().toISOString() });
    if (STATE.recentActions.length > 50) STATE.recentActions.pop();
  }

  function showToast(text) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = text;
    document.body.appendChild(toast);
    setTimeout(() => toast.style.opacity = '0', 2000);
    setTimeout(() => toast.remove(), 2500);
  }

  function getStatusInfo(status) {
    const map = {
      ordered: { text:'Заказана', color:'#E65100', bg:'#FFF3E0' },
      paid: { text:'Оплачена', color:'#E65100', bg:'#FFF3E0' },
      shipped: { text:'Отправлена', color:'#1B5E20', bg:'#E8F5E9' },
      received: { text:'Получена', color:'#2B2B2B', bg:'#F6F6F8' }
    };
    return map[status] || map.ordered;
  }

  function render() {
    renderBottomNav();
    switch (STATE.activeTab) {
      case 'home': renderHome(); break;
      case 'cards': renderCards(); break;
      case 'binder': renderBinder(); break;
      case 'wishlist': renderWishlist(); break;
      case 'settings': renderSettings(); break;
    }
    saveState();
  }

  function renderBottomNav() {
    const nav = document.getElementById('bottomNav');
    const transitCount = STATE.cards.filter(c => c.status !== 'received').length;
    const tabs = [
      { id: 'home', icon: 'home', label: 'Главная' },
      { id: 'cards', icon: 'style', label: 'Мои карты' },
      { id: 'binder', icon: 'photo_album', label: 'Биндер' },
      { id: 'wishlist', icon: 'favorite', label: 'Вишлист' }
    ];
    nav.innerHTML = tabs.map(t => `
      <div class="nav-item ${STATE.activeTab === t.id ? 'active' : ''}" data-tab="${t.id}">
        <span class="nav-icon material-symbols-outlined">${t.icon}</span>
        <span>${t.label}</span>
        ${t.id === 'cards' && transitCount > 0 ? `<span class="badge">${transitCount}</span>` : ''}
      </div>
    `).join('');
    nav.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => { STATE.activeTab = el.dataset.tab; render(); });
    });
  }

  function setHeader(title, showBack = false, backTab = 'home') {
    document.querySelector('.header-title').textContent = title;
    const actionEl = document.getElementById('headerAction');
    if (showBack) {
      actionEl.innerHTML = '<span class="back-btn">← Назад</span>';
      actionEl.onclick = () => { STATE.activeTab = backTab; render(); };
    } else {
      actionEl.innerHTML = '<span class="material-symbols-outlined" style="cursor:pointer;">settings</span>';
      actionEl.onclick = () => { STATE.activeTab = 'settings'; render(); };
    }
  }

  function renderHome() {
    setHeader('🏴‍☠️ ATEEZ BINDER');
    const transitCount = STATE.cards.filter(c => c.status !== 'received').length;
    const receivedCount = STATE.cards.filter(c => c.status === 'received').length;
    const wishCount = STATE.wishlist.length;
    let spent = 0;
    STATE.cards.forEach(c => { if (c.price) spent += Number(c.price) || 0; });

    document.getElementById('mainContent').innerHTML = `
      <div class="big-transit-banner">🚚 ${transitCount} карт в пути</div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-num" style="color:#D3542B;">${receivedCount}</div><div class="stat-label">Получено</div></div>
        <div class="stat-box"><div class="stat-num">${transitCount}</div><div class="stat-label">В пути</div></div>
        <div class="stat-box"><div class="stat-num">${wishCount}</div><div class="stat-label">Вишлист</div></div>
      </div>
      <div class="widget-row">
        <div class="widget-card"><div class="widget-number" style="color:#D3542B;">${transitCount}</div><div class="widget-label">🚚 Ко мне</div></div>
        <div class="widget-card"><div class="widget-number">0</div><div class="widget-label">📤 От меня</div></div>
      </div>
      <div class="finance-block">
        <div class="finance-header" id="financeToggle">
          <span style="font-weight:600;">💰 Финансы</span>
          <span class="collapse-icon ${STATE.financeExpanded ? 'open' : ''}">▼</span>
        </div>
        <div id="financeBody" style="${STATE.financeExpanded ? '' : 'display:none;'}">
          <div class="finance-row"><span>Потрачено</span><span>${spent.toLocaleString()} ₽</span></div>
        </div>
      </div>
      <h4 class="section-title">🕒 Недавние действия</h4>
      ${STATE.recentActions.slice(0,10).map(a => `<div class="feed-item"><div class="info">${a.text}<br><span style="color:#A1A1AA; font-size:0.65rem;">${new Date(a.date).toLocaleString()}</span></div></div>`).join('') || '<div style="color:#A1A1AA;">пока пусто</div>'}
    `;
    document.getElementById('financeToggle').addEventListener('click', () => {
      STATE.financeExpanded = !STATE.financeExpanded;
      document.getElementById('financeBody').style.display = STATE.financeExpanded ? '' : 'none';
      saveState();
    });
  }

  function renderCards() {
    setHeader('Мои карты');
    let cards = [...STATE.cards];
    const filter = STATE.cardFilter || 'all';
    const search = (STATE.cardSearch || '').toLowerCase();
    const groupFilter = STATE.cardGroupFilter || 'all';
    if (filter !== 'all') cards = cards.filter(c => c.status === filter);
    if (groupFilter !== 'all') cards = cards.filter(c => c.group === groupFilter);
    if (search) cards = cards.filter(c =>
      (c.group||'').toLowerCase().includes(search) ||
      (c.member||'').toLowerCase().includes(search) ||
      (c.album||'').toLowerCase().includes(search) ||
      (c.seller||'').toLowerCase().includes(search)
    );
    const groups = [...new Set(STATE.cards.map(c => c.group).filter(Boolean))];

    let html = `
      <input class="search-input" id="cardSearch" placeholder="🔍 Поиск..." value="${STATE.cardSearch||''}">
      <div class="chip-row" style="margin-bottom:6px;">
        <div class="chip-select ${filter === 'all' ? 'active' : ''}" data-filter="all">Все</div>
        <div class="chip-select ${filter === 'ordered' ? 'active' : ''}" data-filter="ordered">Заказана</div>
        <div class="chip-select ${filter === 'paid' ? 'active' : ''}" data-filter="paid">Оплачена</div>
        <div class="chip-select ${filter === 'shipped' ? 'active' : ''}" data-filter="shipped">Отправлена</div>
        <div class="chip-select ${filter === 'received' ? 'active' : ''}" data-filter="received">Получена</div>
      </div>
      <div class="chip-row" style="margin-bottom:10px;">
        <div class="chip-select ${groupFilter === 'all' ? 'active' : ''}" data-group="all">Все группы</div>
        ${groups.map(g => `<div class="chip-select ${groupFilter === g ? 'active' : ''}" data-group="${g}">${g}</div>`).join('')}
      </div>
      ${STATE.showAddForm ? `
        <div class="add-form" id="addForm">
          <h4 style="font-size:0.9rem; margin-bottom:8px;">➕ Добавить карту</h4>
          <label style="font-size:0.7rem;">Группа:</label>
          <div class="chip-row" id="groupChips"></div>
          <label style="font-size:0.7rem;">Участник:</label>
          <div class="chip-row" id="memberChips"></div>
          <label style="font-size:0.7rem;">Альбом:</label>
          <div class="chip-row" id="albumChips"></div>
          <input class="input-field" id="addAlbumInput" placeholder="Или впишите свой альбом">
          <input class="input-field" id="addSeller" placeholder="Продавец">
          <input class="input-field" id="addPrice" placeholder="Цена (₽)" type="number">
          <input class="input-field" id="addDefects" placeholder="Дефекты (если есть)">
          <input class="input-field" id="addDate" type="date" placeholder="Дата покупки">
          <label style="font-size:0.7rem;">Фото лицевой стороны:</label>
          <input type="file" id="addImageFront" accept="image/*" class="input-field">
          <label style="font-size:0.7rem;">Фото задника:</label>
          <input type="file" id="addImageBack" accept="image/*" class="input-field">
          <button class="btn" id="saveNewCard" style="width:100%; margin-top:8px;">Сохранить карту</button>
          <button class="btn small outline" id="cancelNewCard" style="width:100%; margin-top:4px;">Отмена</button>
        </div>
      ` : `<button class="btn" id="showAddFormBtn" style="width:100%; margin-bottom:10px;">+ Добавить карту</button>`}
    `;

    html += cards.map((c, i) => {
      const si = getStatusInfo(c.status);
      const days = c.statusDate ? Math.floor((Date.now() - new Date(c.statusDate)) / 86400000) : 0;
      const frontBg = c.imageFront ? `background-image:url('${c.imageFront}');` : '';
      const backBg = c.imageBack ? `background-image:url('${c.imageBack}');` : '';
      const realIndex = STATE.cards.indexOf(c);
      return `<div class="card-cell" data-card-index="${realIndex}">
        <div class="custom-card-images">
          <div class="custom-card-image-small" style="${frontBg}"></div>
          ${c.imageBack ? `<div class="custom-card-image-small" style="${backBg}"></div>` : ''}
        </div>
        <div style="flex:1;">
          <span style="background:${si.bg}; color:${si.color}; border-radius:8px; padding:2px 6px; font-size:0.55rem;">${si.text}</span><br>
          <b>${c.group||'—'} · ${c.member||'—'}</b><br>
          <span style="font-size:0.65rem;">${c.album||''} · ${c.seller||'?'} · ${c.price||'0'}₽</span>
          ${c.status !== 'received' ? `<br><span style="font-size:0.6rem; color:#A1A1AA;">${days} дн.</span>` : ''}
        </div>
      </div>`;
    }).join('');

    document.getElementById('mainContent').innerHTML = html || 'Нет карт';

    document.getElementById('cardSearch').addEventListener('input', (e) => { STATE.cardSearch = e.target.value; saveState(); render(); });
    document.querySelectorAll('.chip-select[data-filter]').forEach(chip => {
      chip.addEventListener('click', () => { STATE.cardFilter = chip.dataset.filter; saveState(); render(); });
    });
    document.querySelectorAll('.chip-select[data-group]').forEach(chip => {
      chip.addEventListener('click', () => { STATE.cardGroupFilter = chip.dataset.group; saveState(); render(); });
    });

    if (STATE.showAddForm) {
      setupAddForm();
      document.getElementById('cancelNewCard').addEventListener('click', () => {
        STATE.showAddForm = false;
        saveState(); render();
      });
    } else {
      document.getElementById('showAddFormBtn').addEventListener('click', () => {
        STATE.showAddForm = true;
        saveState(); render();
      });
    }

    document.querySelectorAll('[data-card-index]').forEach(el => {
      el.addEventListener('click', () => showCardDetail(parseInt(el.dataset.cardIndex)));
    });
  }

  function setupAddForm() {
    let selGroup = 'ATEEZ';
    let selMember = '';
    let selAlbum = '';

    const updateForm = () => {
      const group = GROUPS[selGroup] || { members:[], albums:[] };
      document.getElementById('groupChips').innerHTML = Object.keys(GROUPS).map(g => `<div class="chip-select ${selGroup===g?'active':''}" data-group="${g}">${g}</div>`).join('');
      document.getElementById('memberChips').innerHTML = group.members.map(m => `<div class="chip-select ${selMember===m?'active':''}" data-member="${m}">${m}</div>`).join('');
      document.getElementById('albumChips').innerHTML = group.albums.map(a => `<div class="chip-select ${selAlbum===a?'active':''}" data-album="${a}">${a}</div>`).join('');

      document.querySelectorAll('#groupChips .chip-select').forEach(chip => {
        chip.addEventListener('click', () => { selGroup = chip.dataset.group; selMember = ''; selAlbum = ''; updateForm(); });
      });
      document.querySelectorAll('#memberChips .chip-select').forEach(chip => {
        chip.addEventListener('click', () => { selMember = chip.dataset.member; updateForm(); });
      });
      document.querySelectorAll('#albumChips .chip-select').forEach(chip => {
        chip.addEventListener('click', () => { selAlbum = chip.dataset.album; updateForm(); });
      });
    };
    updateForm();

    document.getElementById('saveNewCard').addEventListener('click', () => {
      const albumInput = document.getElementById('addAlbumInput').value.trim();
      const finalAlbum = selAlbum || albumInput;
      if (!selMember) return alert('Выберите участника');

      const saveCard = (front, back) => {
        STATE.cards.push({
          id: generateId(), group: selGroup, member: selMember, album: finalAlbum,
          seller: document.getElementById('addSeller').value.trim(),
          price: document.getElementById('addPrice').value.trim(),
          defects: document.getElementById('addDefects').value.trim(),
          date: document.getElementById('addDate').value,
          imageFront: front || '', imageBack: back || '',
          status: 'ordered', statusDate: new Date().toISOString(),
          statusHistory: [{ status:'ordered', date: new Date().toISOString() }]
        });
        addRecentAction(`➕ ${selGroup} — ${selMember}`);
        STATE.showAddForm = false;
        saveState(); render();
      };

      const fileFront = document.getElementById('addImageFront').files[0];
      const fileBack = document.getElementById('addImageBack').files[0];
      if (!fileFront && !fileBack) { saveCard('', ''); return; }
      let frontData = '', backData = '', done = 0;
      const check = () => { done++; if (done === 2) saveCard(frontData, backData); };
      if (fileFront) { const r = new FileReader(); r.onload = e => { frontData = e.target.result; check(); }; r.readAsDataURL(fileFront); } else check();
      if (fileBack) { const r = new FileReader(); r.onload = e => { backData = e.target.result; check(); }; r.readAsDataURL(fileBack); } else check();
    });
  }

  function showCardDetail(index) {
    const card = STATE.cards[index];
    if (!card) return;
    const si = getStatusInfo(card.status);
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `
      <div class="dialog">
        <h4>${card.group} — ${card.member}</h4>
        <div style="display:flex; gap:8px; margin-bottom:8px;">
          <div style="width:80px; height:120px; border-radius:10px; background-size:cover; background-position:center; background-color:#F6F6F8; ${card.imageFront ? `background-image:url('${card.imageFront}')` : ''}"></div>
          ${card.imageBack ? `<div style="width:80px; height:120px; border-radius:10px; background-size:cover; background-position:center; background-color:#F6F6F8; background-image:url('${card.imageBack}')"></div>` : ''}
        </div>
        <div style="font-size:0.8rem;">
          <div><b>Альбом:</b> ${card.album||'—'}</div>
          <div><b>Цена:</b> ${card.price||'—'} ₽</div>
          <div><b>Продавец:</b> ${card.seller||'—'}</div>
          <div><b>Дефекты:</b> ${card.defects||'—'}</div>
          <div><b>Дата:</b> ${card.date||'—'}</div>
          <div><b>Статус:</b> ${si.text}</div>
        </div>
        <div class="chip-row" style="margin-top:6px;">
          ${['ordered','paid','shipped','received'].map(s => `<div class="chip-select ${card.status===s?'active':''}" data-status="${s}">${getStatusInfo(s).text}</div>`).join('')}
        </div>
        <button class="btn small outline" id="closeCardDetail" style="margin-top:10px; width:100%;">Закрыть</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('#closeCardDetail').addEventListener('click', () => overlay.remove());
    overlay.querySelectorAll('[data-status]').forEach(chip => {
      chip.addEventListener('click', () => {
        card.status = chip.dataset.status;
        card.statusDate = new Date().toISOString();
        card.statusHistory.push({ status: card.status, date: new Date().toISOString() });
        addRecentAction(`🔄 ${card.group} — ${card.member}: ${getStatusInfo(card.status).text}`);
        saveState(); render(); overlay.remove();
      });
    });
  }

  function renderBinder() {
    setHeader('Биндер');
    const received = STATE.cards.filter(c => c.status === 'received');
    const grouped = {};
    received.forEach(c => {
      const key = c.group + '|' + c.album;
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(c);
    });
    let html = '';
    Object.entries(grouped).forEach(([key, cards]) => {
      const [group, album] = key.split('|');
      html += `<h4 class="section-title">${group} · ${album}</h4><div class="card-grid">`;
      cards.forEach(c => {
        html += `<div class="card-cell" data-card-id="${c.id}">
          <div class="custom-card-images">
            <div class="custom-card-image-small" style="background-image:url('${c.imageFront||''}'); background-size:cover;"></div>
          </div>
          <div>${c.member}<br><span style="font-size:0.65rem; color:#A1A1AA;">${c.price||'0'}₽</span></div>
        </div>`;
      });
      html += '</div>';
    });
    document.getElementById('mainContent').innerHTML = html || '<div style="color:#A1A1AA;">Нет полученных карт</div>';
    document.querySelectorAll('[data-card-id]').forEach(el => {
      el.addEventListener('click', () => {
        const idx = STATE.cards.findIndex(c => c.id === el.dataset.cardId);
        if (idx > -1) showCardDetail(idx);
      });
    });
  }

  function renderWishlist() {
    setHeader('Вишлист');
    let html = '<button class="btn" id="addWishBtn" style="width:100%; margin-bottom:10px;">+ Добавить в вишлист</button>';
    html += STATE.wishlist.map((w, i) => `
      <div class="card-cell">
        ${w.imageFront ? `<div class="custom-card-image-small" style="background-image:url('${w.imageFront}'); background-size:cover;"></div>` : ''}
        <div style="flex:1;">
          <b>${w.group||'—'} · ${w.member||'—'}</b><br>
          <span style="font-size:0.65rem;">${w.album||''} · ${w.note||''}</span>
        </div>
        <button class="btn small order-wish-btn" data-index="${i}">📦 Заказать</button>
      </div>
    `).join('');
    document.getElementById('mainContent').innerHTML = html || 'Вишлист пуст';
    document.getElementById('addWishBtn')?.addEventListener('click', () => showAddWishDialog());
    document.querySelectorAll('.order-wish-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.index);
        const w = STATE.wishlist[idx];
        STATE.cards.push({
          id: generateId(), group: w.group, member: w.member, album: w.album,
          seller: '', price: '', defects: '', date: '',
          imageFront: w.imageFront || '', imageBack: '',
          status: 'ordered', statusDate: new Date().toISOString(),
          statusHistory: [{ status:'ordered', date: new Date().toISOString() }]
        });
        STATE.wishlist.splice(idx, 1);
        addRecentAction(`📦 Из вишлиста: ${w.group} — ${w.member}`);
        saveState(); render();
      });
    });
  }

  function showAddWishDialog() {
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `
      <div class="dialog">
        <h4>💖 В вишлист</h4>
        <input class="input-field" id="wishGroup" placeholder="Группа">
        <input class="input-field" id="wishMember" placeholder="Участник">
        <input class="input-field" id="wishAlbum" placeholder="Альбом">
        <input class="input-field" id="wishNote" placeholder="Заметка (необязательно)">
        <label style="font-size:0.7rem;">Фото (необязательно):</label>
        <input type="file" id="wishImage" accept="image/*" class="input-field">
        <button class="btn" id="saveWishBtn" style="width:100%; margin-top:10px;">Сохранить</button>
        <button class="btn small outline" id="cancelWishBtn" style="width:100%; margin-top:4px;">Отмена</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('#saveWishBtn').addEventListener('click', () => {
      const group = overlay.querySelector('#wishGroup').value.trim();
      const member = overlay.querySelector('#wishMember').value.trim();
      if (!group || !member) return alert('Введите группу и участника');
      const file = overlay.querySelector('#wishImage').files[0];
      const saveWish = (img) => {
        STATE.wishlist.push({
          id: generateId(), group, member,
          album: overlay.querySelector('#wishAlbum').value.trim(),
          note: overlay.querySelector('#wishNote').value.trim(),
          imageFront: img || ''
        });
        saveState(); render(); overlay.remove();
      };
      if (file) { const r = new FileReader(); r.onload = e => saveWish(e.target.result); r.readAsDataURL(file); }
      else saveWish('');
    });
    overlay.querySelector('#cancelWishBtn').addEventListener('click', () => overlay.remove());
  }

  function renderSettings() {
    setHeader('Настройки');
    document.getElementById('mainContent').innerHTML = `
      <div style="text-align:center; color:#A1A1AA; padding:40px;">
        <span class="material-symbols-outlined" style="font-size:3rem;">settings</span>
        <p>Настройки скоро появятся</p>
        <button class="btn small" id="backFromSettings">← На главную</button>
      </div>
    `;
    document.getElementById('backFromSettings').addEventListener('click', () => { STATE.activeTab = 'home'; render(); });
  }

  loadState();
  render();
</script>
</body>
</html>
