    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      font-family: 'Nunito', system-ui, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 0; margin: 0;
    }
    .app-container {
      width: 100%; max-width: 420px; background: #F6F6F8;
      background-image: radial-gradient(circle at 20% 30%, rgba(255,215,0,0.06) 0%, transparent 50%),

      box-shadow: 0 0 40px rgba(0,0,0,0.2); overflow: hidden;
      display: flex; flex-direction: column; height: 100vh; max-height: 820px;
    }
    .header {
      background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
      padding: 12px 16px; color: #2B2B2B;
      font-weight: 700; font-size: 1.1rem; display: flex;
      align-items: center; justify-content: space-between; flex-shrink: 0;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }
    .header-left { display: flex; align-items: center; gap: 6px; }
    .back-btn {
      background: none; border: none; color: #D3542B; font-size: 1rem;
      font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 8px;
    }
    .main-content {
      flex: 1; overflow-y: auto; padding: 12px; background: transparent;
      -webkit-overflow-scrolling: touch;
    }
    .bottom-nav {
      display: flex; justify-content: space-around; align-items: center;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
      border-top: 1px solid rgba(0,0,0,0.04);
      padding: 8px 0 12px; flex-shrink: 0; overflow-x: auto;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px; color: #A1A1AA; font-size: 0.6rem; font-weight: 600;
      cursor: pointer; padding: 4px 8px; border-radius: 14px; transition: 0.2s;
      position: relative; white-space: nowrap;
    }
    .nav-item.active { color: #D3542B; background: rgba(211,84,43,0.08); }
    .nav-icon { font-size: 1.3rem; line-height: 1; }
    .badge {
      background: #D3542B; color: #FFFFFF; border-radius: 10px;
      padding: 0 5px; font-size: 0.55rem; font-weight: 700;
      position: absolute; top: -2px; right: -2px;
    }
    .btn {
      background: #D3542B; border: none; padding: 8px 14px;
      border-radius: 16px; font-weight: 700; font-size: 0.75rem;
      color: #FFFFFF; cursor: pointer; transition: 0.2s;
    }
    .btn:active { transform: scale(0.96); }
    .btn.small { padding: 4px 10px; font-size: 0.7rem; }
    .btn.outline { background: transparent; border: 1px solid #D3542B; color: #D3542B; }
    .input-field {
      width: 100%; margin: 4px 0; padding: 8px; border-radius: 12px;
      border: 1px solid #E0E0E0; font-size: 0.8rem; background: #FFFFFF;
      font-family: 'Nunito', sans-serif;
    }
    select.input-field { appearance: auto; }
    .chip-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0; }
    .chip-select {
      padding: 6px 12px; border-radius: 20px; font-size: 0.7rem;
      background: #F6F6F8; color: #2B2B2B; cursor: pointer;
      border: 1px solid rgba(0,0,0,0.04); font-weight: 600;
    }
    .chip-select.active { background: #D3542B; color: #FFFFFF; border-color: #D3542B; }
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #2B2B2B; color: #FFFFFF; padding: 12px 24px;
      border-radius: 20px; font-size: 0.8rem; z-index: 200; font-weight: 600;
    }
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    .dialog {
      background: #FFFFFF; border-radius: 22px; padding: 24px;
      width: 90%; max-width: 340px; color: #2B2B2B;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      max-height: 80vh; overflow-y: auto;
    }
    .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .card-cell {
      background: #FFFFFF; border-radius: 16px; padding: 12px;
      color: #2B2B2B; font-size: 0.8rem; cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04); transition: 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .card-cell:active { background: #F6F6F8; }
    .feed-item {
      background: #FFFFFF; border-radius: 18px; overflow: hidden;
      margin-bottom: 12px; box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }
    .feed-item .info { padding: 12px; color: #2B2B2B; font-size: 0.8rem; }
    .stat-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .stat-box {
      flex: 1; background: #FFFFFF; border-radius: 14px;
      padding: 10px; text-align: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }
    .stat-box .stat-num { font-size: 1.2rem; font-weight: 700; }
    .stat-box .stat-label { font-size: 0.6rem; color: #A1A1AA; margin-top: 2px; font-weight: 600; }
    .widget-row { display: flex; gap: 8px; margin: 10px 0; }
    .widget-card {
      flex: 1; background: #FFFFFF; border-radius: 14px;
      padding: 10px; text-align: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.03);
    }
    .widget-card .widget-number { font-size: 1.3rem; font-weight: 700; }
    .widget-card .widget-label { font-size: 0.6rem; color: #A1A1AA; margin-top: 2px; font-weight: 600; }
    .big-transit-banner {
      background: #D3542B; color: #FFFFFF; border-radius: 16px;
      padding: 16px; text-align: center; margin-bottom: 12px;
      font-size: 1rem; font-weight: 700;
    }
    .finance-block {
      background: #FFFFFF; border-radius: 16px;
      padding: 12px; margin-bottom: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }
    .finance-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .finance-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.75rem; color: #2B2B2B; }
    .collapse-icon { transition: transform 0.3s; font-size: 0.9rem; color: #A1A1AA; }
    .collapse-icon.open { transform: rotate(180deg); }
    .section-title { color: #2B2B2B; font-size: 0.85rem; margin: 10px 0 6px; font-weight: 700; }
    .search-input {
      width: 100%; padding: 10px; border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.06); background: #FFFFFF;
      font-size: 0.8rem; margin-bottom: 10px; font-family: 'Nunito', sans-serif;
    }
    .custom-card-images { display: flex; gap: 4px; flex-shrink: 0; }

      width: 40px; height: 60px; border-radius: 8px;
      background-size: cover; background-position: center;
      background-color: #F6F6F8;

      background: #FFFFFF; border-radius: 16px; padding: 14px;

      background: #FFFFFF; border-radius: 14px; margin-bottom: 6px;
      cursor: pointer; transition: 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.03);

      text-align: center; padding: 20px; background: #FFFFFF;
      border-radius: 18px; margin-bottom: 12px;
    }
    .seller-feed {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px;
    }
    .seller-feed-item {
      aspect-ratio: 2/3; border-radius: 12px;
      background-size: cover; background-position: center;
      background-color: #F6F6F8; position: relative; cursor: pointer;

      font-size: 0.7rem; text-align: center;

  function t(key, replacements = {}) {
    const lang = STATE.settings.language || 'ru';
    let text = LANG[lang]?.[key] || LANG['ru'][key] || key;
    Object.entries(replacements).forEach(([k, v]) => {
      text = text.replace(`{${k}}`, v);
    });
    return text;
  }

  // ========== АУДИО ==========
  const bgMusic = document.getElementById('bgMusic');
  bgMusic.volume = STATE.settings.musicVolume || 0.3;

  function updateMusicIcon() {
    const icon = document.getElementById('musicToggle');
    if (icon) {
      icon.textContent = STATE.settings.sound ? 'volume_up' : 'volume_off';
    }
  }

  document.getElementById('musicToggle').addEventListener('click', () => {
    STATE.settings.sound = !STATE.settings.sound;
    if (STATE.settings.sound) {
      bgMusic.play().catch(() => {});
    } else {
      bgMusic.pause();
    }
    updateMusicIcon();
    saveState();
  });

  document.addEventListener('click', () => {
    if (STATE.settings.sound && bgMusic.paused) {
      bgMusic.play().catch(() => {});
    }
  }, { once: true });

  // ========== ЗАГРУЗКА / СОХРАНЕНИЕ ==========
  function loadState() {
    const saved = localStorage.getItem('inteox_data');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        STATE.cards = parsed.cards || [];
        STATE.wishlist = parsed.wishlist || [];
        STATE.sellers = parsed.sellers || [];
        STATE.archive = parsed.archive || [];
        STATE.recentActions = parsed.recentActions || [];
        STATE.financeExpanded = parsed.financeExpanded !== undefined ? parsed.financeExpanded : true;
        STATE.cardFilter = parsed.cardFilter || 'all';
        STATE.cardSearch = parsed.cardSearch || '';
        STATE.cardGroupFilter = parsed.cardGroupFilter || 'all';
        STATE.showAddForm = false;
        STATE.profile = parsed.profile || { name: '', avatar: '' };
        STATE.settings = parsed.settings || { sound: true, language: 'ru', musicVolume: 0.3 };
        STATE.binderSlots = parsed.binderSlots || 50;
        customGroups = parsed.customGroups || {};
      } catch(e) {}
    }
    bgMusic.volume = STATE.settings.musicVolume || 0.3;
    updateMusicIcon();
  }

  function saveState() {
    localStorage.setItem('inteox_data', JSON.stringify({ ...STATE, customGroups }));
  }

  function exportData() {
    const data = JSON.stringify({ ...STATE, customGroups }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'binder_backup_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast(t('dataExported'));
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        STATE.cards = data.cards || [];
        STATE.wishlist = data.wishlist || [];
        STATE.sellers = data.sellers || [];
        STATE.archive = data.archive || [];
        STATE.recentActions = data.recentActions || [];
        STATE.profile = data.profile || { name: '', avatar: '' };
        STATE.settings = data.settings || { sound: true, language: 'ru', musicVolume: 0.3 };
        STATE.binderSlots = data.binderSlots || 50;
        customGroups = data.customGroups || {};
        saveState();
        render();
        showToast(t('dataImported'));
      } catch(err) {
        showToast(t('importError'));
      }
    };
    reader.readAsText(file);
  }

  function addRecentAction(text, cardId = null) {
    STATE.recentActions.unshift({ text, cardId, date: new Date().toISOString() });
    if (STATE.recentActions.length > 50) STATE.recentActions.pop();
  }

  function showToast(text) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = text;
    document.body.appendChild(toast);
    setTimeout(() => toast.style.opacity = '0', 2000);
    setTimeout(() => toast.remove(), 2500);
  }

  function getStatusInfo(status) {
    const map = {
      ordered: { text: t('ordered'), color:'#E65100', bg:'#FFF3E0' },
      paid: { text: t('paid'), color:'#E65100', bg:'#FFF3E0' },
      shipped: { text: t('shipped'), color:'#1B5E20', bg:'#E8F5E9' },
      received: { text: t('received'), color:'#2B2B2B', bg:'#F6F6F8' }
    };
    return map[status] || map.ordered;
  }

  function render() {
    renderBottomNav();
    switch (STATE.activeTab) {
      case 'home': renderHome(); break;
      case 'cards': renderCards(); break;
      case 'binder': renderBinder(); break;
      case 'wishlist': renderWishlist(); break;
      case 'sellers': renderSellers(); break;
      case 'profile': renderProfile(); break;
      case 'settings': renderSettings(); break;
      case 'sellerDetail': renderSellerDetail(); break;
    }
    saveState();
    updateMusicIcon();
  }

  function renderBottomNav() {
    const nav = document.getElementById('bottomNav');
    const transitCount = STATE.cards.filter(c => c.status !== 'received').length;
    const tabs = [
      { id: 'home', icon: 'home', label: t('home') },
      { id: 'cards', icon: 'style', label: t('myCards') },
      { id: 'binder', icon: 'photo_album', label: t('binder') },
      { id: 'wishlist', icon: 'favorite', label: t('wishlist') },
      { id: 'sellers', icon: 'chat', label: t('sellers') }
    ];
    nav.innerHTML = tabs.map(tab => `
      <div class="nav-item ${STATE.activeTab === tab.id ? 'active' : ''}" data-tab="${tab.id}">
        <span class="nav-icon material-symbols-outlined">${tab.icon}</span>
        <span>${tab.label}</span>
        ${tab.id === 'cards' && transitCount > 0 ? `<span class="badge">${transitCount}</span>` : ''}
      </div>
    `).join('');
    nav.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => { STATE.activeTab = el.dataset.tab; render(); });
    });
  }

  function setHeader(title, showBack = false, backTab = 'home') {
    document.querySelector('.header-title').textContent = title;
    document.getElementById('settingsBtn').onclick = () => { STATE.activeTab = 'settings'; render(); };
    document.getElementById('profileBtn').onclick = () => { STATE.activeTab = 'profile'; render(); };
  }

  // ========== ГЛАВНАЯ ==========
  function renderHome() {
    setHeader(t('binder'));
    const transitCount = STATE.cards.filter(c => c.status !== 'received').length;
    const receivedCount = STATE.cards.filter(c => c.status === 'received').length;
    const wishCount = STATE.wishlist.length;
    let spent = 0;
    STATE.cards.forEach(c => { if (c.price) spent += Number(c.price) || 0; });

    document.getElementById('mainContent').innerHTML = `
      <div class="big-transit-banner">🚚 ${transitCount} ${t('transit')}</div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-num" style="color:#D3542B;">${receivedCount}</div><div class="stat-label">${t('collected')}</div></div>
        <div class="stat-box"><div class="stat-num">${transitCount}</div><div class="stat-label">${t('inTransit')}</div></div>
        <div class="stat-box"><div class="stat-num">${wishCount}</div><div class="stat-label">${t('wishlistCount')}</div></div>
      </div>
      <div class="widget-row">
        <div class="widget-card"><div class="widget-number" style="color:#D3542B;">${transitCount}</div><div class="widget-label">${t('toMe')}</div></div>
        <div class="widget-card"><div class="widget-number">0</div><div class="widget-label">${t('fromMe')}</div></div>
      </div>
      <div class="finance-block">
        <div class="finance-header" id="financeToggle">
          <span style="font-weight:700;">${t('finances')}</span>
          <span class="collapse-icon ${STATE.financeExpanded ? 'open' : ''}">▼</span>
        </div>
        <div id="financeBody" style="${STATE.financeExpanded ? '' : 'display:none;'}">
          <div class="finance-row"><span>${t('spent')}</span><span>${spent.toLocaleString()} ₽</span></div>
        </div>
      </div>
      <h4 class="section-title">${t('recentActions')}</h4>
      ${STATE.recentActions.slice(0,10).map(a => {
        const card = a.cardId ? STATE.cards.find(c => c.id === a.cardId) : null;

          <div style="aspect-ratio:2/3; background-size:cover; background-position:center; background-color:#F6F6F8; ${img}"></div>

    `;

      document.getElementById('financeBody').style.display = STATE.financeExpanded ? '' : 'none';
      saveState();
    });
  }

  // ========== МОИ КАРТЫ ==========
  function renderCards() {
    setHeader(t('myCards'));
    let cards = [...STATE.cards];
    const filter = STATE.cardFilter || 'all';
    const search = (STATE.cardSearch || '').toLowerCase();
    const groupFilter = STATE.cardGroupFilter || 'all';
    if (filter !== 'all') cards = cards.filter(c => c.status === filter);
    if (groupFilter !== 'all') cards = cards.filter(c => c.group === groupFilter);
    if (search) cards = cards.filter(c =>
      (c.group||'').toLowerCase().includes(search) || (c.member||'').toLowerCase().includes(search) ||
      (c.album||'').toLowerCase().includes(search) || (c.seller||'').toLowerCase().includes(search)
    );
    const groups = [...new Set(STATE.cards.map(c => c.group).filter(Boolean))];

    const usedSlots = STATE.cards.length;
    const totalSlots = STATE.binderSlots;
    const limitPercent = Math.min(100, (usedSlots / totalSlots) * 100);

    let html = `
      <div class="limit-bar">
        ${t('limitInfo', { used: usedSlots, total: totalSlots })}
        <div style="background:rgba(0,0,0,0.04); height:6px; border-radius:3px; margin-top:4px;">
          <div style="width:${limitPercent}%; height:100%; background:#D3542B; border-radius:3px; transition:width 0.3s;"></div>
        </div>
      </div>
      <input class="search-input" id="cardSearch" placeholder="${t('search')}" value="${STATE.cardSearch||''}">
      <div class="chip-row" style="margin-bottom:6px;">
        <div class="chip-select ${filter === 'all' ? 'active' : ''}" data-filter="all">${t('all')}</div>
        <div class="chip-select ${filter === 'ordered' ? 'active' : ''}" data-filter="ordered">${t('ordered')}</div>
        <div class="chip-select ${filter === 'paid' ? 'active' : ''}" data-filter="paid">${t('paid')}</div>
        <div class="chip-select ${filter === 'shipped' ? 'active' : ''}" data-filter="shipped">${t('shipped')}</div>
        <div class="chip-select ${filter === 'received' ? 'active' : ''}" data-filter="received">${t('received')}</div>
      </div>
      <div class="chip-row" style="margin-bottom:10px;">
        <div class="chip-select ${groupFilter === 'all' ? 'active' : ''}" data-group="all">${t('allGroups')}</div>
        ${groups.map(g => `<div class="chip-select ${groupFilter === g ? 'active' : ''}" data-group="${g}">${g}</div>`).join('')}
      </div>
      ${STATE.showAddForm ? renderAddForm() : `<button class="btn" id="showAddFormBtn" style="width:100%; margin-bottom:10px;">${t('addCard')}</button>`}
    `;

    html += cards.map((c, i) => {
      const si = getStatusInfo(c.status);
      const days = c.statusDate ? Math.floor((Date.now() - new Date(c.statusDate)) / 86400000) : 0;
      const frontBg = c.imageFront ? `background-image:url('${c.imageFront}');` : '';
      const backBg = c.imageBack ? `background-image:url('${c.imageBack}');` : '';
      const realIndex = STATE.cards.indexOf(c);
      return `<div class="card-cell" data-card-index="${realIndex}">
        <div class="custom-card-images">
          <div class="custom-card-image-small" style="${frontBg}"></div>
          ${c.imageBack ? `<div class="custom-card-image-small" style="${backBg}"></div>` : ''}
        </div>
        <div style="flex:1;">
          <span style="background:${si.bg}; color:${si.color}; border-radius:8px; padding:2px 6px; font-size:0.55rem;">${si.text}</span><br>
          <b>${c.group||'—'} · ${c.member||'—'}</b><br>
          <span style="font-size:0.65rem;">${c.album||''} · ${c.seller||'?'} · ${c.price||'0'}₽</span>
          ${c.trackNumber ? `<br><span style="font-size:0.6rem;">📦 ${c.trackNumber}</span>` : ''}
          ${c.status !== 'received' ? `<br><span style="font-size:0.6rem; color:#A1A1AA;">${days} дн.</span>` : ''}
        </div>
      </div>`;
    }).join('');

    document.getElementById('mainContent').innerHTML = html || `<div style="color:#A1A1AA;">${t('noCards')}</div>`;

    document.getElementById('cardSearch').addEventListener('input', (e) => { STATE.cardSearch = e.target.value; saveState(); render(); });
    document.querySelectorAll('.chip-select[data-filter]').forEach(chip => {
      chip.addEventListener('click', () => { STATE.cardFilter = chip.dataset.filter; saveState(); render(); });
    });
    document.querySelectorAll('.chip-select[data-group]').forEach(chip => {
      chip.addEventListener('click', () => { STATE.cardGroupFilter = chip.dataset.group; saveState(); render(); });
    });

    if (STATE.showAddForm) {
      setupAddForm();
      document.getElementById('cancelNewCard').addEventListener('click', () => { STATE.showAddForm = false; saveState(); render(); });
    } else {
      document.getElementById('showAddFormBtn')?.addEventListener('click', () => {
        if (STATE.cards.length >= STATE.binderSlots) {
          if (confirm(t('limitReached') + '\n\n' + t('expandBinder'))) {
            STATE.binderSlots += 10;
            saveState();
            showToast(t('slotsAdded', { total: STATE.binderSlots }));
            STATE.showAddForm = true;
            render();
          }
        } else {
          STATE.showAddForm = true;
          render();
        }
      });
    }

    document.querySelectorAll('[data-card-index]').forEach(el => {
      el.addEventListener('click', () => showCardDetail(parseInt(el.dataset.cardIndex)));
    });
  }

  function renderAddForm() {
    const sellerOptions = STATE.sellers.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
    return `
      <div class="add-form" id="addForm">
        <h4 style="font-size:0.9rem; margin-bottom:8px;">➕ ${t('addCard')}</h4>
        <label style="font-size:0.7rem;">${t('group')}:</label>
        <div class="chip-row" id="groupChips"></div>
        <input class="input-field" id="addNewGroup" placeholder="${t('addGroup')}">
        <label style="font-size:0.7rem;">${t('member')}:</label>
        <div class="chip-row" id="memberChips"></div>
        <input class="input-field" id="addNewMember" placeholder="${t('addMember')}">
        <label style="font-size:0.7rem;">${t('album')}:</label>
        <div class="chip-row" id="albumChips"></div>
        <input class="input-field" id="addAlbumInput" placeholder="${t('addAlbum')}">
        <label style="font-size:0.7rem;">${t('seller')}:</label>
        <select class="input-field" id="addSellerSelect">
          <option value="">${t('selectSeller')}</option>
          ${sellerOptions}
        </select>
        <input class="input-field" id="addSellerNew" placeholder="${t('newSeller')}">
        <input class="input-field" id="addPrice" placeholder="${t('price')}" type="number">
        <input class="input-field" id="addTrack" placeholder="${t('track')}">
        <input class="input-field" id="addDefects" placeholder="${t('defects')}">
        <input class="input-field" id="addDate" type="date" placeholder="${t('date')}">
        <label style="font-size:0.7rem;">${t('photoFront')}:</label>
        <input type="file" id="addImageFront" accept="image/*" class="input-field">
        <label style="font-size:0.7rem;">${t('photoBack')}:</label>
        <input type="file" id="addImageBack" accept="image/*" class="input-field">
        <button class="btn" id="saveNewCard" style="width:100%; margin-top:8px;">${t('saveCard')}</button>
        <button class="btn small outline" id="cancelNewCard" style="width:100%; margin-top:4px;">${t('cancel')}</button>
      </div>
    `;
  }

  function setupAddForm() {
    let selGroup = 'ATEEZ';
    let selMember = '';
    let selAlbum = '';
    const allGroups = getAllGroups();

    const updateForm = () => {
      const group = allGroups[selGroup] || { members:[], albums:[] };
      document.getElementById('groupChips').innerHTML = Object.keys(allGroups).map(g => `<div class="chip-select ${selGroup===g?'active':''}" data-group="${g}">${g}</div>`).join('');
      document.getElementById('memberChips').innerHTML = group.members.map(m => `<div class="chip-select ${selMember===m?'active':''}" data-member="${m}">${m}</div>`).join('');
      document.getElementById('albumChips').innerHTML = group.albums.map(a => `<div class="chip-select ${selAlbum===a?'active':''}" data-album="${a}">${a}</div>`).join('');

      document.querySelectorAll('#groupChips .chip-select').forEach(chip => {
        chip.addEventListener('click', () => { selGroup = chip.dataset.group; selMember = ''; selAlbum = ''; updateForm(); });
      });
      document.querySelectorAll('#memberChips .chip-select').forEach(chip => {
        chip.addEventListener('click', () => { selMember = chip.dataset.member; updateForm(); });
      });
      document.querySelectorAll('#albumChips .chip-select').forEach(chip => {
        chip.addEventListener('click', () => { selAlbum = chip.dataset.album; updateForm(); });
      });
    };
    updateForm();

    document.getElementById('saveNewCard').addEventListener('click', () => {
      const newGroup = document.getElementById('addNewGroup').value.trim();
      if (newGroup) {
        if (!customGroups[newGroup]) customGroups[newGroup] = { members: [], albums: [] };
        selGroup = newGroup;
      }

      const newMember = document.getElementById('addNewMember').value.trim();
      if (newMember) {
        if (!customGroups[selGroup]) customGroups[selGroup] = { members: [], albums: [] };
        if (!customGroups[selGroup].members.includes(newMember)) {
          customGroups[selGroup].members.push(newMember);
        }
        selMember = newMember;
      }

      let finalAlbum = selAlbum;
      const albumInput = document.getElementById('addAlbumInput').value.trim();
      if (albumInput) finalAlbum = albumInput;
      if (finalAlbum && !allGroups[selGroup]?.albums.includes(finalAlbum)) {
        if (!customGroups[selGroup]) customGroups[selGroup] = { members: [], albums: [] };
        customGroups[selGroup].albums.push(finalAlbum);
      }

      if (!selMember) return alert(t('selectMember'));

      let sellerName = document.getElementById('addSellerSelect').value;
      if (!sellerName) sellerName = document.getElementById('addSellerNew').value.trim();
      if (sellerName && !STATE.sellers.find(s => s.name === sellerName)) {
        STATE.sellers.push({ id: generateId(), name: sellerName, avatar: '', note: '', reviews: [] });
      }

      const saveCard = (front, back) => {
        const card = {
          id: generateId(), group: selGroup, member: selMember, album: finalAlbum,
          seller: sellerName, price: document.getElementById('addPrice').value.trim(),
          trackNumber: document.getElementById('addTrack').value.trim(),
          defects: document.getElementById('addDefects').value.trim(),
          date: document.getElementById('addDate').value,
          imageFront: front || '', imageBack: back || '',
          status: 'ordered', statusDate: new Date().toISOString(),
          statusHistory: [{ status:'ordered', date: new Date().toISOString() }]
        };
        STATE.cards.push(card);
        addRecentAction(`➕ ${selGroup} — ${selMember}`, card.id);
        STATE.showAddForm = false;
        saveState(); render();
        showToast(t('cardAdded'));
      };

      const fileFront = document.getElementById('addImageFront').files[0];
      const fileBack = document.getElementById('addImageBack').files[0];
      if (!fileFront && !fileBack) { saveCard('', ''); return; }
      let frontData = '', backData = '', done = 0;
      const check = () => { done++; if (done === 2) saveCard(frontData, backData); };
      if (fileFront) { const r = new FileReader(); r.onload = e => { frontData = e.target.result; check(); }; r.readAsDataURL(fileFront); } else check();
      if (fileBack) { const r = new FileReader(); r.onload = e => { backData = e.target.result; check(); }; r.readAsDataURL(fileBack); } else check();
    });
  }

  function showCardDetail(index) {
    const card = STATE.cards[index];
    if (!card) return;
    const si = getStatusInfo(card.status);
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `
      <div class="dialog">
        <h4>${card.group} — ${card.member}</h4>
        <div style="display:flex; gap:8px; margin-bottom:8px;">
          <div style="width:80px; height:120px; border-radius:10px; background-size:cover; background-position:center; background-color:#F6F6F8; ${card.imageFront ? `background-image:url('${card.imageFront}')` : ''}"></div>
          ${card.imageBack ? `<div style="width:80px; height:120px; border-radius:10px; background-size:cover; background-color:#F6F6F8; background-image:url('${card.imageBack}')"></div>` : ''}
        </div>
        <div style="font-size:0.8rem;">
          <div><b>${t('album')}:</b> ${card.album||'—'}</div>
          <div><b>${t('price')}:</b> ${card.price||'—'} ₽</div>
          <div><b>${t('seller')}:</b> ${card.seller||'—'}</div>
          <div><b>${t('track')}:</b> ${card.trackNumber||'—'}</div>
          <div><b>${t('defects')}:</b> ${card.defects||'—'}</div>
          <div><b>${t('date')}:</b> ${card.date||'—'}</div>
          <div><b>Статус:</b> ${si.text}</div>
        </div>
        <div class="chip-row" style="margin-top:6px;">
          ${['ordered','paid','shipped','received'].map(s => `<div class="chip-select ${card.status===s?'active':''}" data-status="${s}">${getStatusInfo(s).text}</div>`).join('')}
        </div>
        <button class="btn small" id="editCardBtn" style="margin-top:6px;">${t('editCard')}</button>
        <button class="btn small danger" id="deleteCardBtn" style="margin-top:4px;">${t('delete')}</button>
        <button class="btn small outline" id="closeCardDetail" style="margin-top:6px; width:100%;">${t('close')}</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('#closeCardDetail').addEventListener('click', () => overlay.remove());
    overlay.querySelectorAll('[data-status]').forEach(chip => {
      chip.addEventListener('click', () => {
        card.status = chip.dataset.status;
        card.statusDate = new Date().toISOString();
        card.statusHistory.push({ status: card.status, date: new Date().toISOString() });
        addRecentAction(`${t('statusChanged')}: ${card.group} — ${card.member}`, card.id);
        saveState(); render(); overlay.remove();
      });
    });
    overlay.querySelector('#editCardBtn').addEventListener('click', () => { overlay.remove(); showEditCardDialog(index); });
    overlay.querySelector('#deleteCardBtn').addEventListener('click', () => {
      const reason = prompt(t('deleteReason'));
      if (reason) {
        STATE.archive.push({ ...card, deleteReason: reason, deletedAt: new Date().toISOString() });
        STATE.cards.splice(index, 1);
        addRecentAction(`${t('cardDeleted')}: ${card.group} — ${card.member} (${reason})`);
        saveState(); render(); overlay.remove();
      }
    });
  }

  function showEditCardDialog(index) {
    const card = STATE.cards[index];
    if (!card) return;
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    const sellerOptions = STATE.sellers.map(s => `<option value="${s.name}" ${card.seller===s.name?'selected':''}>${s.name}</option>`).join('');
    overlay.innerHTML = `
      <div class="dialog">
        <h4>${t('editCard')}</h4>
        <label style="font-size:0.7rem;">${t('seller')}:</label>
        <select class="input-field" id="editSellerSelect">
          <option value="">${t('selectSeller')}</option>
          ${sellerOptions}
        </select>
        <input class="input-field" id="editSellerNew" placeholder="${t('newSeller')}">
        <input class="input-field" id="editPrice" placeholder="${t('price')}" value="${card.price||''}">
        <input class="input-field" id="editTrack" placeholder="${t('track')}" value="${card.trackNumber||''}">
        <input class="input-field" id="editDefects" placeholder="${t('defects')}" value="${card.defects||''}">
        <button class="btn" id="saveEditBtn" style="width:100%; margin-top:10px;">${t('save')}</button>
        <button class="btn small outline" id="cancelEditBtn" style="width:100%; margin-top:4px;">${t('cancel')}</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('#saveEditBtn').addEventListener('click', () => {
      let sellerName = overlay.querySelector('#editSellerSelect').value;
      if (!sellerName) sellerName = overlay.querySelector('#editSellerNew').value.trim();
      if (sellerName && !STATE.sellers.find(s => s.name === sellerName)) {
        STATE.sellers.push({ id: generateId(), name: sellerName, avatar: '', note: '', reviews: [] });
      }
      card.seller = sellerName;
      card.price = overlay.querySelector('#editPrice').value.trim();
      card.trackNumber = overlay.querySelector('#editTrack').value.trim();
      card.defects = overlay.querySelector('#editDefects').value.trim();
      addRecentAction(`✏️ ${t('editCard')}: ${card.group} — ${card.member}`, card.id);
      saveState(); render(); overlay.remove();
    });
    overlay.querySelector('#cancelEditBtn').addEventListener('click', () => overlay.remove());
  }

  // ========== БИНДЕР ==========
  function renderBinder() {
    setHeader(t('binder'));
    const received = STATE.cards.filter(c => c.status === 'received');
    const grouped = {};
    received.forEach(c => {
      const key = c.group + '|' + c.album;
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(c);
    });
    let html = '';
    Object.entries(grouped).forEach(([key, cards]) => {
      const [group, album] = key.split('|');
      html += `<h4 class="section-title">${group} · ${album}</h4><div class="card-grid">`;
      cards.forEach(c => {
        html += `<div class="card-cell" data-card-id="${c.id}">
          <div class="custom-card-images">
            <div class="custom-card-image-small" style="background-image:url('${c.imageFront||''}'); background-size:cover;"></div>
          </div>
          <div>${c.member}<br><span style="font-size:0.65rem; color:#A1A1AA;">${c.price||'0'}₽</span></div>
        </div>`;
      });
      html += '</div>';
    });
    document.getElementById('mainContent').innerHTML = html || `<div style="color:#A1A1AA;">${t('noReceived')}</div>`;
    document.querySelectorAll('[data-card-id]').forEach(el => {
      el.addEventListener('click', () => {
        const idx = STATE.cards.findIndex(c => c.id === el.dataset.cardId);
        if (idx > -1) showCardDetail(idx);
      });
    });
  }

  // ========== ВИШЛИСТ ==========
  function renderWishlist() {
    setHeader(t('wishlist'));
    let html = `<button class="btn" id="addWishBtn" style="width:100%; margin-bottom:10px;">${t('addToWishlist')}</button>`;
    html += STATE.wishlist.map((w, i) => `
      <div class="card-cell">
        ${w.imageFront ? `<div class="custom-card-image-small" style="background-image:url('${w.imageFront}'); background-size:cover;"></div>` : ''}
        <div style="flex:1;">
          <b>${w.group||'—'} · ${w.member||'—'}</b><br>
          <span style="font-size:0.65rem;">${w.album||''} · ${w.note||''}</span>
        </div>
        <button class="btn small order-wish-btn" data-index="${i}">${t('order')}</button>
        <button class="btn small outline share-wish-btn" data-index="${i}" style="margin-left:2px;">${t('share')}</button>
      </div>
    `).join('');
    document.getElementById('mainContent').innerHTML = html || `<div style="color:#A1A1AA;">${t('emptyWishlist')}</div>`;
    document.getElementById('addWishBtn')?.addEventListener('click', () => showAddWishDialog());
    document.querySelectorAll('.order-wish-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.index);
        const w = STATE.wishlist[idx];
        STATE.cards.push({
          id: generateId(), group: w.group, member: w.member, album: w.album,
          seller: '', price: '', trackNumber: '', defects: '', date: '',
          imageFront: w.imageFront || '', imageBack: '',
          status: 'ordered', statusDate: new Date().toISOString(),
          statusHistory: [{ status:'ordered', date: new Date().toISOString() }]
        });
        STATE.wishlist.splice(idx, 1);
        addRecentAction(`📦 ${t('order')}: ${w.group} — ${w.member}`);
        saveState(); render();
      });
    });
    document.querySelectorAll('.share-wish-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const w = STATE.wishlist[parseInt(btn.dataset.index)];
        if (!w) return;
        const text = `💖 ${t('wishlist')}: ${w.group} — ${w.member} (${w.album}) ${w.note ? '— ' + w.note : ''}`;
        if (navigator.share) {
          navigator.share({ title: t('wishlist'), text });
        } else {
          prompt('Скопируйте текст:', text);
        }
      });
    });
  }

  function showAddWishDialog() {
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `
      <div class="dialog">
        <h4>💖 ${t('addToWishlist')}</h4>
        <input class="input-field" id="wishGroup" placeholder="${t('group')}">
        <input class="input-field" id="wishMember" placeholder="${t('member')}">
        <input class="input-field" id="wishAlbum" placeholder="${t('album')}">
        <input class="input-field" id="wishNote" placeholder="${t('defects')}">
        <label style="font-size:0.7rem;">${t('photoFront')}:</label>
        <input type="file" id="wishImage" accept="image/*" class="input-field">
        <button class="btn" id="saveWishBtn" style="width:100%; margin-top:10px;">${t('save')}</button>
        <button class="btn small outline" id="cancelWishBtn" style="width:100%; margin-top:4px;">${t('cancel')}</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('#saveWishBtn').addEventListener('click', () => {
      const group = overlay.querySelector('#wishGroup').value.trim();
      const member = overlay.querySelector('#wishMember').value.trim();
      if (!group || !member) return alert(t('selectMember'));
      const file = overlay.querySelector('#wishImage').files[0];
      const saveWish = (img) => {
        STATE.wishlist.push({
          id: generateId(), group, member,
          album: overlay.querySelector('#wishAlbum').value.trim(),
          note: overlay.querySelector('#wishNote').value.trim(),
          imageFront: img || ''
        });
        saveState(); render(); overlay.remove();
      };
      if (file) { const r = new FileReader(); r.onload = e => saveWish(e.target.result); r.readAsDataURL(file); }
      else saveWish('');
    });
    overlay.querySelector('#cancelWishBtn').addEventListener('click', () => overlay.remove());
  }

  // ========== ПРОДАВЦЫ ==========
  function renderSellers() {
    setHeader(t('sellers'));
    const sellers = STATE.sellers || [];
    let html = '';
    sellers.forEach((s, i) => {
      const cards = STATE.cards.filter(c => c.seller === s.name);
      const lastCard = cards[cards.length - 1];
      const avgRating = s.reviews?.length ? (s.reviews.reduce((sum,r) => sum + r.rating, 0) / s.reviews.length).toFixed(1) : '—';
      html += `
        <div class="chat-item" data-seller-index="${i}">
          <div class="person-avatar" style="background-image:url('${s.avatar||''}'); background-size:cover;"></div>
          <div style="flex:1;">
            <b>${s.name}</b><br>
            <span style="font-size:0.65rem; color:#A1A1AA;">${lastCard ? `${lastCard.group} — ${lastCard.member} · ${lastCard.price}₽` : 'Нет сделок'}</span>
          </div>
          <div style="text-align:right;">
            <div style="font-size:0.65rem;">⭐ ${avgRating}</div>
            <div style="font-size:0.55rem; color:#A1A1AA;">${cards.length} карт</div>
          </div>
        </div>
      `;
    });
    document.getElementById('mainContent').innerHTML = html || `<div style="color:#A1A1AA; text-align:center; padding:40px;">${t('noSellers')}</div>`;
    document.querySelectorAll('[data-seller-index]').forEach(el => {
      el.addEventListener('click', () => {
        STATE.activeTab = 'sellerDetail';
        STATE.selectedSellerIndex = parseInt(el.dataset.sellerIndex);
        render();
      });
    });
  }

  function renderSellerDetail() {
    const seller = STATE.sellers[STATE.selectedSellerIndex];
    if (!seller) { STATE.activeTab = 'sellers'; render(); return; }
    setHeader(seller.name, true, 'sellers');
    const cards = STATE.cards.filter(c => c.seller === seller.name);
    const avgRating = seller.reviews?.length ? (seller.reviews.reduce((s,r) => s + r.rating, 0) / seller.reviews.length).toFixed(1) : '—';

    let html = `
      <div class="profile-header">
        <div class="person-avatar large" id="sellerAvatarLarge" style="background-image:url('${seller.avatar||''}'); background-size:cover; cursor:pointer;" title="Нажмите, чтобы изменить аватар"></div>
        <h4>${seller.name}</h4>
        <div style="font-size:0.8rem;">⭐ ${avgRating} (${cards.length} сделок)</div>
        <input type="file" id="sellerAvatarInput" accept="image/*" style="display:none;">
        <button class="btn small" id="editSellerNoteBtn" style="margin-top:6px;">${t('notes')}</button>
      </div>
      <h4 class="section-title">${t('reviews')}</h4>
      ${seller.reviews?.map(r => `<div style="font-size:0.7rem; margin:4px 0; background:#FFFFFF; padding:8px; border-radius:10px;"><span class="star-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span> — ${r.text||''}</div>`).join('') || `<div style="font-size:0.7rem; color:#A1A1AA;">${t('noReviews')}</div>`}
      <button class="btn small" id="addReviewBtn" style="margin-top:8px;">${t('leaveReview')}</button>
      <h4 class="section-title">${t('feed')}</h4>
      <div class="seller-feed">
        ${cards.map(c => `
          <div class="seller-feed-item" style="background-image:url('${c.imageFront||''}');" data-card-id="${c.id}">
            <div class="caption">${c.group} — ${c.member}<br>${c.price||'0'}₽</div>
          </div>
        `).join('')}
      </div>
    `;
    document.getElementById('mainContent').innerHTML = html || '<div style="color:#A1A1AA;">Нет карт</div>';

    document.getElementById('sellerAvatarLarge').addEventListener('click', () => {
      document.getElementById('sellerAvatarInput').click();
    });
    document.getElementById('sellerAvatarInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const r = new FileReader();
        r.onload = ev => {
          seller.avatar = ev.target.result;
          saveState(); render();
        };
        r.readAsDataURL(file);
      }
    });

    document.getElementById('editSellerNoteBtn').addEventListener('click', () => {
      const note = prompt(t('notes'), seller.note || '');
      if (note !== null) { seller.note = note; saveState(); render(); }
    });

    document.getElementById('addReviewBtn').addEventListener('click', () => {
      showAddReviewDialog(STATE.selectedSellerIndex);
    });

    document.querySelectorAll('[data-card-id]').forEach(el => {
      el.addEventListener('click', () => {
        const idx = STATE.cards.findIndex(c => c.id === el.dataset.cardId);
        if (idx > -1) showCardDetail(idx);
      });
    });
  }

  function showAddReviewDialog(sellerIndex) {
    const seller = STATE.sellers[sellerIndex];
    if (!seller) return;
    let rating = 5;

    const overlay = document.createElement('div');
    overlay.className = 'overlay';

    const renderStars = () => {
        overlay.innerHTML = `
          <div class="dialog">
            <h4>⭐ Отзыв на ${seller.name} <span style="color:#A1A1AA; font-size:0.7rem;">(для себя)</span></h4>
            <div class="chip-row" style="margin:8px 0;">
              ${[1,2,3,4,5].map(r => `<div class="chip-select ${rating===r?'active':''}" data-rating="${r}">${'★'.repeat(r)}</div>`).join('')}
            </div>
            <textarea id="reviewText" placeholder="Текст отзыва" class="input-field" rows="3"></textarea>
            <button class="btn" id="saveReviewBtn" style="width:100%; margin-top:10px;">Сохранить</button>
            <button class="btn small outline" id="cancelReviewBtn" style="width:100%; margin-top:4px;">Отмена</button>
          </div>
        `;

        overlay.querySelectorAll('[data-rating]').forEach(chip => {
            chip.addEventListener('click', () => {
                rating = parseInt(chip.dataset.rating);
                renderStars();
            });
        });

        overlay.querySelector('#saveReviewBtn').addEventListener('click', () => {
            seller.reviews.push({
                rating,
                text: overlay.querySelector('#reviewText').value.trim(),
                date: new Date().toISOString()
            });
            saveState();
            render();
            overlay.remove();
        });

        overlay.querySelector('#cancelReviewBtn').addEventListener('click', () => overlay.remove());
    };

    renderStars();
    document.body.appendChild(overlay);
  }

  // ========== ПРОФИЛЬ ==========
  function renderProfile() {
    setHeader(t('profile'));
    const received = STATE.cards.filter(c => c.status === 'received').length;
    const transit = STATE.cards.filter(c => c.status !== 'received').length;
    let spent = 0;
    STATE.cards.forEach(c => { if (c.price) spent += Number(c.price) || 0; });

    document.getElementById('mainContent').innerHTML = `
      <div class="profile-header">
        <div class="person-avatar large" id="profileAvatarLarge" style="background-image:url('${STATE.profile.avatar||''}'); background-size:cover; cursor:pointer;" title="Нажмите, чтобы изменить аватар"></div>
        <input type="file" id="profileAvatarInput" accept="image/*" style="display:none;">
        <h4>${STATE.profile.name || 'Коллекционер'}</h4>
        <div style="font-size:0.7rem; color:#A1A1AA;">${received} получено · ${transit} в пути · ${spent.toLocaleString()} ₽</div>
        <button class="btn small" id="editProfileBtn" style="margin-top:8px;">✏️ Имя</button>
      </div>
      <h4 class="section-title">${t('archive')}</h4>
      <div style="color:#A1A1AA; text-align:center; padding:40px;">${t('archiveUnavailable')}</div>
      <button class="btn small" id="backFromProfile" style="width:100%; margin-top:10px;">${t('backToHome')}</button>
    `;

    document.getElementById('profileAvatarLarge').addEventListener('click', () => {
      document.getElementById('profileAvatarInput').click();
    });
    document.getElementById('profileAvatarInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const r = new FileReader();
        r.onload = ev => {
          STATE.profile.avatar = ev.target.result;
          saveState(); render();
        };
        r.readAsDataURL(file);
      }
    });

    document.getElementById('editProfileBtn').addEventListener('click', () => {
      const name = prompt('Имя:', STATE.profile.name);
      if (name !== null) { STATE.profile.name = name; saveState(); render(); }
    });
    document.getElementById('backFromProfile').addEventListener('click', () => { STATE.activeTab = 'home'; render(); });
  }

  // ========== НАСТРОЙКИ ==========
  function renderSettings() {
    setHeader(t('settings'));
    document.getElementById('mainContent').innerHTML = `
      <div style="text-align:center; padding:20px;">
        <div style="margin:10px 0;">
          <label style="font-size:0.8rem;">${t('sound')}</label>
          <input type="checkbox" ${STATE.settings.sound ? 'checked' : ''} id="toggleSound" style="margin-left:8px;">
        </div>
        <div style="margin:10px 0;">
          <label style="font-size:0.8rem;">${t('musicVolume')}</label>
          <input type="range" min="0" max="100" value="${(STATE.settings.musicVolume||0.3)*100}" id="volumeSlider" style="margin-left:8px; width:60%;">
        </div>
        <div style="margin:10px 0;">
          <label style="font-size:0.8rem;">${t('language')}</label>
          <select id="langSelect" style="margin-left:8px; padding:4px; border-radius:8px;">
            <option value="ru" ${STATE.settings.language==='ru'?'selected':''}>Русский</option>
            <option value="en" ${STATE.settings.language==='en'?'selected':''}>English</option>
          </select>
        </div>
        <button class="btn small" id="exportBtn" style="margin:6px;">${t('exportData')}</button>
        <button class="btn small" id="importBtn" style="margin:6px;">${t('importData')}</button>
        <input type="file" id="importFile" accept=".json" style="display:none;">
        <button class="btn small danger" id="resetDataBtn" style="margin-top:20px;">${t('resetData')}</button>
        <button class="btn small outline" id="backFromSettings" style="margin-top:10px; width:100%;">${t('backToHome')}</button>
      </div>
    `;
    document.getElementById('toggleSound').addEventListener('change', (e) => {
      STATE.settings.sound = e.target.checked;
      if (STATE.settings.sound) { bgMusic.play().catch(() => {}); } else { bgMusic.pause(); }
      updateMusicIcon();
      saveState();
    });
    document.getElementById('volumeSlider').addEventListener('input', (e) => {
      STATE.settings.musicVolume = e.target.value / 100;
      bgMusic.volume = STATE.settings.musicVolume;
      saveState();
    });
    document.getElementById('langSelect').addEventListener('change', (e) => {
      STATE.settings.language = e.target.value;
      saveState();
      render();
    });
    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('importFile').click();
    });
    document.getElementById('importFile').addEventListener('change', (e) => {
      if (e.target.files[0]) importData(e.target.files[0]);
    });
    document.getElementById('resetDataBtn').addEventListener('click', () => {
      if (confirm('Точно сбросить все данные?')) { localStorage.clear(); location.reload(); }
    });
    document.getElementById('backFromSettings').addEventListener('click', () => { STATE.activeTab = 'home'; render(); });
  }

  loadState();
  render();
</script>
</body>
</html>
