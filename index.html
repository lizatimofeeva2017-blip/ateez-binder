<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ATEEZ Binder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..600&family=Lora:ital,wght@0,600;1,600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #E8E8ED;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 0; margin: 0;
    }
    .app-container {
      width: 100%; max-width: 420px; background: #F6F6F8;
      box-shadow: 0 0 40px rgba(0,0,0,0.08); overflow: hidden;
      display: flex; flex-direction: column; height: 100vh; max-height: 820px;
    }
    .header {
      background: #FFFFFF; padding: 14px 16px; color: #2B2B2B;
      font-weight: 600; font-size: 1rem; display: flex;
      align-items: center; justify-content: space-between; flex-shrink: 0;
      border-bottom: 1px solid rgba(0,0,0,0.04); font-family: 'Lora', serif;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .back-btn {
      background: none; border: none; color: #D3542B; font-size: 1rem;
      font-weight: 500; cursor: pointer; padding: 4px 8px; border-radius: 8px;
    }
    .main-content {
      flex: 1; overflow-y: auto; padding: 12px; background: #F6F6F8;
      -webkit-overflow-scrolling: touch;
    }
    .bottom-nav {
      display: flex; justify-content: space-around; align-items: center;
      background: #FFFFFF; border-top: 1px solid rgba(0,0,0,0.04);
      padding: 8px 0 12px; flex-shrink: 0;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px; color: #A1A1AA; font-size: 0.65rem; font-weight: 500;
      cursor: pointer; padding: 4px 10px; border-radius: 14px; transition: 0.2s;
      position: relative;
    }
    .nav-item.active { color: #D3542B; background: rgba(211,84,43,0.08); }
    .nav-icon { font-size: 1.4rem; line-height: 1; }
    .badge {
      background: #D3542B; color: #FFFFFF; border-radius: 10px;
      padding: 0 5px; font-size: 0.6rem; font-weight: 600;
      position: absolute; top: -2px; right: -2px;
    }
    .binder-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      background: #FFFFFF; padding: 16px; border-radius: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }
    .card-slot {
      aspect-ratio: 2/3; border-radius: 14px; position: relative;
      display: flex; align-items: center; justify-content: center;
      color: #2B2B2B; font-weight: 600; cursor: pointer; transition: 0.2s;
      background: #FFFFFF; border: 1px solid rgba(0,0,0,0.06);
      background-size: cover; background-position: center; overflow: hidden;
      filter: brightness(0.6);
    }
    .card-slot:active { transform: scale(0.96); }
    .card-slot.owned {
      border: 1.5px solid #D3542B; box-shadow: 0 0 0 3px rgba(211,84,43,0.1);
      filter: brightness(1);
    }
    .card-slot .like {
      position: absolute; top: 6px; left: 6px; font-size: 0.9rem;
    }
    .card-slot .transit-badge {
      position: absolute; bottom: 6px; right: 6px; background: #F6F6F8;
      border-radius: 8px; padding: 2px 6px; font-size: 0.55rem;
      color: #2B2B2B; border: 1px solid rgba(0,0,0,0.06);
    }
    .pin-icon {
      position: absolute; top: 6px; right: 6px; font-size: 0.9rem;
      cursor: pointer; z-index: 5; color: #A1A1AA;
    }
    .empty-slot {
      background: #F6F6F8; border: 1px dashed rgba(0,0,0,0.1); color: #A1A1AA;
    }
    .btn {
      background: #D3542B; border: none; padding: 8px 14px;
      border-radius: 16px; font-weight: 600; font-size: 0.75rem;
      color: #FFFFFF; cursor: pointer; transition: 0.2s;
    }
    .btn.small { padding: 4px 10px; font-size: 0.7rem; }
    .btn.outline {
      background: transparent; border: 1px solid #D3542B; color: #D3542B;
    }
    .btn.danger {
      background: transparent; border: 1px solid #D3542B; color: #D3542B;
    }
    .dialog {
      background: #FFFFFF; border-radius: 22px; padding: 24px;
      width: 90%; max-width: 340px; color: #2B2B2B;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    }
    .dialog h4 {
      font-family: 'Lora', serif; font-size: 1rem; margin-bottom: 12px;
    }
    .status-btn {
      background: #F6F6F8; border: 1px solid rgba(0,0,0,0.04);
      padding: 8px 12px; border-radius: 14px; margin: 3px;
      font-size: 0.75rem; color: #2B2B2B; cursor: pointer;
    }
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #2B2B2B; color: #FFFFFF; padding: 12px 24px;
      border-radius: 20px; font-size: 0.8rem; z-index: 200;
    }
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    .progress-bar {
      width: 100%; height: 6px; background: rgba(0,0,0,0.04);
      border-radius: 3px; margin: 8px 0;
    }
    .progress-fill { height: 100%; background: #D3542B; border-radius: 3px; }
    .chip {
      background: rgba(211,84,43,0.08); border-radius: 14px;
      padding: 4px 10px; font-size: 0.7rem; color: #D3542B; font-weight: 500;
    }
    .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .card-cell {
      background: #FFFFFF; border-radius: 16px; padding: 14px;
      color: #2B2B2B; font-size: 0.8rem; cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04); transition: 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .feed-item {
      background: #FFFFFF; border-radius: 18px; overflow: hidden;
      margin-bottom: 12px; box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }
    .feed-item .info { padding: 12px; color: #2B2B2B; font-size: 0.8rem; }
    @media (max-width: 400px) {
      .nav-item { padding: 2px 6px; font-size: 0.6rem; }
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body>
<div class="app-container" id="app">
  <div class="header" id="header">
    <div class="header-left"><span class="header-title">Главная</span></div>
    <div id="headerAction"><span class="material-symbols-outlined" style="cursor:pointer;">settings</span></div>
  </div>
  <div class="main-content" id="mainContent"></div>
  <div class="bottom-nav" id="bottomNav"></div>
</div>

<script>
  const STATE = {
    activeTab: 'home',
    binder: {
      album: 'golden_hour_pt1',
      versionType: null,
      subversion: null,
      page: 0
    },
    pinnedCard: null,
    wishlist: [],
    transitArchive: [],
    achievements: [],
    recentActions: [],
    cards: {}
  };

  const MEMBERS = ['Hongjoong','Seonghwa','Yunho','Yeosang','San','Mingi','Wooyoung','Jongho'];
  const ALBUM_MEMBERS_ORDER = ['Seonghwa','Hongjoong','Yunho','Yeosang','San','Mingi','Wooyoung','Jongho'];

  function getPhotoPath(cardKey) {
    if (!cardKey) return '';
    let path = cardKey.replace('golden_hour_pt1', 'gh1');
    // Убираем _card и оставляем только номер
    path = path.replace(/_(card)(\d+)$/, '_$2');
    return `cards/${path}.jpg`;
  }

  function getCardImageStyle(cardKey) {
    const path = getPhotoPath(cardKey);
    return `background-image:url('${path}');`;
  }

  function getCardDisplayName(cardKey) {
    if (!cardKey) return '';
    const parts = cardKey.split('_');
    // Извлекаем номер карты
    const cardNum = parseInt(parts[parts.length-1].replace('card',''));

    // Позиции задников: 5, 14, 23, 32 (всегда в центре страницы)
    if (cardNum === 5 || cardNum === 14 || cardNum === 23 || cardNum === 32) {
        return 'Задник';
    }

    // Для карт до 5: номер = позиция
    // Для карт между 5 и 14: номер = позиция - 1
    // Для карт между 14 и 23: номер = позиция - 2
    // Для карт после 32: номер = позиция - 4
    let memberIndex;
    if (cardNum < 5) {
        memberIndex = cardNum - 1;
    } else if (cardNum < 14) {
        memberIndex = cardNum - 2; // -1 за задник 5
    } else if (cardNum < 23) {
        memberIndex = cardNum - 3; // -2 за задники 5 и 14
    } else if (cardNum < 32) {
        memberIndex = cardNum - 4; // -3 за задники 5, 14, 23
    } else {
        memberIndex = cardNum - 5; // -4 за задники 5, 14, 23, 32
    }

    const member = ALBUM_MEMBERS_ORDER[memberIndex % 8];

    if (cardKey.includes('album_blue')) {
        return `Album Blue · ${member}`;
    } else if (cardKey.includes('album_diary')) {
        return `Album Diary · ${member}`;
    } else if (cardKey.includes('album_gh')) {
        return `Album GH · ${member}`;
    } else if (cardKey.includes('poco')) {
        return `POCA · ${member}`;
    }
    return cardKey;
}

  function initCards() {
    if (!STATE.cards._init) {
      for (let i = 1; i <= 18; i++) {
        STATE.cards[`golden_hour_pt1_album_blue_card${i}`] = createCardState();
        STATE.cards[`golden_hour_pt1_album_diary_card${i}`] = createCardState();
        STATE.cards[`golden_hour_pt1_album_gh_card${i}`] = createCardState();
      }
      for (let i = 1; i <= 36; i++) {
        STATE.cards[`golden_hour_pt1_poco_card${i}`] = createCardState();
      }
      STATE.cards._init = true;
    }
  }

  function createCardState() {
    return {
      owned: false, dupes: [], date: '', comment: '', rarity: 1, price: '',
      transitStatus: null, transitData: null, statusHistory: []
    };
  }

  function loadState() {
    const saved = localStorage.getItem('ateez_binder_gh1_final2');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        Object.assign(STATE, parsed);
        STATE.cards = STATE.cards || {};
        STATE.transitArchive = STATE.transitArchive || [];
        STATE.achievements = STATE.achievements || [];
        STATE.recentActions = STATE.recentActions || [];
        STATE.wishlist = STATE.wishlist || [];
        STATE.binder = STATE.binder || { album: 'golden_hour_pt1', versionType: null, subversion: null, page: 0 };
      } catch(e) {}
    }
    initCards();
  }

  function saveState() {
    localStorage.setItem('ateez_binder_gh1_final2', JSON.stringify(STATE));
  }

  function addRecentAction(text, cardId = null) {
    STATE.recentActions.unshift({ text, cardId, date: new Date().toISOString() });
    if (STATE.recentActions.length > 30) STATE.recentActions.pop();
  }

  function showToast(text) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = text;
    document.body.appendChild(toast);
    setTimeout(() => toast.style.opacity = '0', 2500);
    setTimeout(() => toast.remove(), 3000);
  }

  function updateAchievements() {
    let ownedTotal = 0, transitExists = false;
    Object.values(STATE.cards).forEach(c => {
      if (c.owned) ownedTotal++;
      if (c.transitStatus) transitExists = true;
    });
    const totalCards = Object.keys(STATE.cards).length - 1;
    if (ownedTotal >= 1 && !STATE.achievements.includes('first')) {
      STATE.achievements.push('first');
      showToast('🏆 Птенец! Первая карта');
      addRecentAction('🏆 Достижение: Первая карта!');
    }
    if (ownedTotal === totalCards && !STATE.achievements.includes('full')) {
      STATE.achievements.push('full');
      showToast('🎉 Полный сет!');
      addRecentAction('🏆 Достижение: Полный сет!');
    }
    if (transitExists && !STATE.achievements.includes('transit')) {
      STATE.achievements.push('transit');
      showToast('📦 Первая карта в пути');
      addRecentAction('🏆 Достижение: Первый заказ в пути');
    }
  }

  function render() {
    renderBottomNav();
    switch (STATE.activeTab) {
      case 'home': renderHome(); break;
      case 'binder': renderBinder(); break;
      case 'wishlist': renderWishlist(); break;
      case 'duplicates': renderDuplicates(); break;
      case 'transit': renderTransit(); break;
    }
    saveState();
  }

  function renderBottomNav() {
    const nav = document.getElementById('bottomNav');
    const tabs = [
      { id: 'home', icon: 'home', label: 'Главная' },
      { id: 'binder', icon: 'photo_album', label: 'Биндер' },
      { id: 'wishlist', icon: 'favorite', label: 'Вишлист' },
      { id: 'duplicates', icon: 'content_copy', label: 'Дубликаты' },
      { id: 'transit', icon: 'local_shipping', label: 'В пути' }
    ];
    const transitCount = Object.values(STATE.cards).filter(c => c.transitStatus).length;
    nav.innerHTML = tabs.map(t => `
      <div class="nav-item ${STATE.activeTab === t.id ? 'active' : ''}" data-tab="${t.id}">
        <span class="nav-icon material-symbols-outlined">${t.icon}</span>
        <span>${t.label}</span>
        ${t.id === 'transit' && transitCount > 0 ? `<span class="badge">${transitCount}</span>` : ''}
      </div>
    `).join('');
    nav.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => { STATE.activeTab = el.dataset.tab; render(); });
    });
  }

  function setHeader(title, showBack = false, backAction = null) {
    document.querySelector('.header-title').textContent = title;
    const actionEl = document.getElementById('headerAction');
    if (showBack) {
      actionEl.innerHTML = '<span class="back-btn">← Назад</span>';
      actionEl.onclick = backAction || (() => {
        if (STATE.activeTab === 'binder') {
          const b = STATE.binder;
          if (b.subversion) { b.subversion = null; }
          else if (b.versionType) { b.versionType = null; b.page = 0; }
          else STATE.activeTab = 'home';
          render();
        } else { STATE.activeTab = 'home'; render(); }
      });
    } else {
      actionEl.innerHTML = '<span class="material-symbols-outlined" style="cursor:pointer;">settings</span>';
    }
  }

  // ГЛАВНАЯ
  function renderHome() {
    setHeader('Главная');
    const cards = Object.values(STATE.cards).filter(c => c && typeof c === 'object');
    const owned = cards.filter(c => c.owned).length;
    const total = Object.keys(STATE.cards).length - 1;
    const transitCount = cards.filter(c => c.transitStatus).length;
    const wishCount = STATE.wishlist.length;
    const dupCount = cards.reduce((s, c) => s + (c.dupes?.length || 0), 0);
    const pinnedData = STATE.pinnedCard ? STATE.cards[STATE.pinnedCard] : null;

    document.getElementById('mainContent').innerHTML = `
      <div style="display:flex; gap:10px; margin-bottom:14px;">
        <div style="flex:1; background:#FFFFFF; border-radius:16px; padding:14px; text-align:center; box-shadow:0 4px 14px rgba(0,0,0,0.04);">
          <div style="color:#D3542B; font-size:1.4rem; font-weight:600;">${owned}/${total}</div>
          <div style="color:#A1A1AA; font-size:0.7rem;">Собрано</div>
        </div>
        <div style="flex:1; background:#FFFFFF; border-radius:16px; padding:14px; text-align:center; box-shadow:0 4px 14px rgba(0,0,0,0.04);">
          <div style="color:#2B2B2B; font-size:1.4rem; font-weight:600;">${wishCount}</div>
          <div style="color:#A1A1AA; font-size:0.7rem;">Вишлист</div>
        </div>
        <div style="flex:1; background:#FFFFFF; border-radius:16px; padding:14px; text-align:center; box-shadow:0 4px 14px rgba(0,0,0,0.04);">
          <div style="color:#2B2B2B; font-size:1.4rem; font-weight:600;">${dupCount}</div>
          <div style="color:#A1A1AA; font-size:0.7rem;">Дублей</div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${total ? (owned/total)*100 : 0}%"></div></div>
      <div style="color:#A1A1AA; font-size:0.7rem; margin-bottom:12px;">${transitCount} карт в пути</div>
      ${pinnedData ? `<div class="feed-item" id="pinnedCard">
        <div style="aspect-ratio:2/3; background-size:cover; background-position:center; background-image:url('${getPhotoPath(STATE.pinnedCard)}'); background-color:#F6F6F8;"></div>
        <div class="info"><b>Закреплена:</b> ${getCardDisplayName(STATE.pinnedCard)}</div>
      </div>` : ''}
      <h4 style="color:#2B2B2B; font-family:'Lora',serif; margin:10px 0 6px;">Достижения</h4>
      <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;">
        ${[
          { key: 'first', icon: 'nest_eco_leaf', text: 'Птенец' },
          { key: 'full', icon: 'trophy', text: 'Полный сет' },
          { key: 'transit', icon: 'package_2', text: 'Посылочка' }
        ].map(a => `
          <span class="chip" style="opacity:${STATE.achievements.includes(a.key) ? 1 : 0.4}; display:flex; align-items:center; gap:4px;">
            <span class="material-symbols-outlined" style="font-size:1rem;">${a.icon}</span> ${a.text}
          </span>
        `).join('')}
      </div>
      <h4 style="color:#2B2B2B; font-family:'Lora',serif; margin:10px 0 6px;">Недавние действия</h4>
      ${STATE.recentActions.slice(0, 10).map(a => {
        const imgPath = a.cardId ? getPhotoPath(a.cardId) : '';
        return `
        <div class="feed-item">
          <div style="aspect-ratio:2/3; background-size:cover; background-position:center; background-color:#F6F6F8; ${imgPath ? `background-image:url('${imgPath}');` : ''}">
          </div>
          <div class="info">${a.text}<br><span style="color:#A1A1AA; font-size:0.65rem;">${new Date(a.date).toLocaleString()}</span></div>
        </div>`;
      }).join('') || '<div style="color:#A1A1AA;">пока пусто</div>'}
    `;
    document.getElementById('pinnedCard')?.addEventListener('click', () => {
      if (confirm('Открепить карту?')) { STATE.pinnedCard = null; render(); }
    });
  }

  // БИНДЕР
  function renderBinder() {
    const b = STATE.binder;
    if (!b.versionType) {
      setHeader('Golden Hour Pt.1');
      document.getElementById('mainContent').innerHTML = `
        <div class="card-grid">
          <div class="card-cell" data-type="album">📘 Album Ver.</div>
          <div class="card-cell" data-type="poca">📷 POCA Ver.</div>
        </div>`;
      document.querySelectorAll('.card-cell[data-type]').forEach(el => {
        el.addEventListener('click', () => { b.versionType = el.dataset.type; b.page = 0; render(); });
      });
    } else if (b.versionType === 'album' && !b.subversion) {
      setHeader('Album Ver.', true, () => { b.versionType = null; render(); });
      document.getElementById('mainContent').innerHTML = `
        <div class="card-grid">
          <div class="card-cell" data-sub="blue">Blue hour Ver.</div>
          <div class="card-cell" data-sub="diary">Diary Ver.</div>
          <div class="card-cell" data-sub="gh">Golden hour Ver.</div>
        </div>`;
      document.querySelectorAll('.card-cell[data-sub]').forEach(el => {
        el.addEventListener('click', () => { b.subversion = el.dataset.sub; b.page = 0; render(); });
      });
    } else {
      renderBinderPage();
    }
  }

  function renderBinderPage() {
    const b = STATE.binder;
    const isPoca = (b.versionType === 'poca');
    let totalCards, prefix;

    if (isPoca) {
      totalCards = 36;
      prefix = 'golden_hour_pt1_poco';
    } else {
      totalCards = 18;
      prefix = `golden_hour_pt1_album_${b.subversion}`;
    }

    const totalPages = Math.ceil(totalCards / 9);
    const rows = 3;

    const start = b.page * 9;
    const pageCards = [];
    for (let i = start; i < Math.min(start + 9, totalCards); i++) {
      pageCards.push(i + 1);
    }

    setHeader(isPoca ? 'POCA Ver.' : `Album ${b.subversion}`, true, () => {
      if (isPoca) { b.versionType = null; }
      else { b.subversion = null; }
      b.page = 0;
      render();
    });

    let gridHtml = `<div class="binder-grid" style="grid-template-rows: repeat(${rows}, 1fr);">`;
    pageCards.forEach(cardNum => {
      const cardKey = `${prefix}_card${cardNum}`;
      const card = STATE.cards[cardKey] || createCardState();
      const owned = card.owned;
      const transitStatus = card.transitStatus;
      const pinned = STATE.pinnedCard === cardKey;
      const liked = STATE.wishlist.includes(cardKey);
      const imgStyle = getCardImageStyle(cardKey);
      gridHtml += `<div class="card-slot ${owned ? 'owned' : ''}" data-card-key="${cardKey}" style="${imgStyle} background-size:cover; background-position:center;">
        <span class="pin-icon material-symbols-outlined" data-pin-key="${cardKey}" style="color:${pinned ? '#D3542B' : '#A1A1AA'};">push_pin</span>
        ${liked ? '<span class="like material-symbols-outlined" style="color:#D3542B;">favorite</span>' : ''}
        ${transitStatus ? `<span class="transit-badge" style="background:${transitStatus==='ordered'?'#FFF3E0':transitStatus==='paid'?'#FFF3E0':'#E8F5E9'}; color:${transitStatus==='ordered'?'#E65100':transitStatus==='paid'?'#E65100':'#1B5E20'};"><span class="material-symbols-outlined" style="font-size:0.7rem;">local_shipping</span> ${transitStatus==='ordered'?'Заказана':transitStatus==='paid'?'Оплачена':'В пути'}</span>` : ''}
      </div>`;
    });
    gridHtml += '</div>';

    let pagination = '';
    if (totalPages > 1) {
      pagination = `<div style="display:flex; justify-content:center; margin-top:8px; gap:8px;">
        <button class="btn small" id="prevPage" ${b.page === 0 ? 'disabled' : ''}>←</button>
        <span style="line-height:2;">${b.page+1}/${totalPages}</span>
        <button class="btn small" id="nextPage" ${b.page === totalPages-1 ? 'disabled' : ''}>→</button>
      </div>`;
    }
    document.getElementById('mainContent').innerHTML = gridHtml + pagination;
    document.getElementById('prevPage')?.addEventListener('click', () => { b.page--; render(); });
    document.getElementById('nextPage')?.addEventListener('click', () => { b.page++; render(); });

    document.querySelectorAll('.card-slot[data-card-key]').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('pin-icon') || e.target.closest('.pin-icon')) return;
        showCardDetail(el.dataset.cardKey);
      });
    });
    document.querySelectorAll('.pin-icon').forEach(icon => {
      icon.addEventListener('click', (e) => {
        e.stopPropagation();
        const key = icon.dataset.pinKey;
        STATE.pinnedCard = (STATE.pinnedCard === key) ? null : key;
        document.querySelectorAll('.pin-icon').forEach(ic => {
          ic.style.color = (ic.dataset.pinKey === STATE.pinnedCard) ? '#D3542B' : '#A1A1AA';
        });
      });
    });
  }

  function showCardDetail(cardKey) {
    const card = STATE.cards[cardKey];
    if (!card) return;
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `
      <div class="dialog">
        <h4>${getCardDisplayName(cardKey)}</h4>
        <div style="margin:6px 0;"><input type="checkbox" ${card.owned ? 'checked' : ''} id="ownedToggle"> Получена</div>
        ${card.owned ? '<button class="btn small danger" id="cancelOwnedBtn">Отменить получение</button>' : ''}
        <div style="margin:6px 0;"><button class="btn small" id="toggleLikeBtn"><span class="material-symbols-outlined">favorite</span> ${STATE.wishlist.includes(cardKey) ? 'Убрать' : 'В вишлист'}</button></div>
        <div style="margin:6px 0;"><button class="btn small" id="addDupeBtn"><span class="material-symbols-outlined">add</span> Дубликат</button></div>
        <div>Дубликатов: ${card.dupes.length}</div>
        ${card.dupes.map((d,i) => `<div style="font-size:0.7rem;">Дубль ${i+1}: ${d.source||'-'} ${d.price||''}₽</div>`).join('')}
        <div style="margin:6px 0;"><button class="btn small" id="transitBtn"><span class="material-symbols-outlined">local_shipping</span> В путь</button></div>
        ${!card.owned ? '<button class="btn small" id="gotItBtn"><span class="material-symbols-outlined">check</span> Я получил(а)!</button>' : ''}
        <button class="btn small outline" id="closeDialog" style="margin-top:10px; width:100%;">Закрыть</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('#closeDialog').addEventListener('click', () => overlay.remove());
    overlay.querySelector('#ownedToggle').addEventListener('change', e => {
      card.owned = e.target.checked;
      if (!card.owned) card.dupes = [];
      addRecentAction(card.owned ? '✅ Получена карта' : '❌ Отменена', cardKey);
      saveState(); render(); overlay.remove();
    });
    overlay.querySelector('#cancelOwnedBtn')?.addEventListener('click', () => {
      if (confirm('Отменить получение?')) { card.owned = false; saveState(); render(); overlay.remove(); }
    });
    overlay.querySelector('#toggleLikeBtn').addEventListener('click', () => {
      const idx = STATE.wishlist.indexOf(cardKey);
      if (idx > -1) STATE.wishlist.splice(idx, 1);
      else STATE.wishlist.push(cardKey);
      saveState(); render(); overlay.remove();
    });
    overlay.querySelector('#addDupeBtn').addEventListener('click', () => {
      const source = prompt('Откуда дубликат?');
      const price = prompt('Цена (₽)');
      card.dupes.push({ source: source || '', price: price || '', date: new Date().toISOString() });
      addRecentAction('🃏 Добавлен дубликат', cardKey);
      saveState(); render(); overlay.remove();
    });
    overlay.querySelector('#transitBtn').addEventListener('click', () => {
      overlay.remove();
      showTransitForm(cardKey);
    });
    overlay.querySelector('#gotItBtn')?.addEventListener('click', () => {
      card.owned = true;
      card.date = new Date().toISOString().slice(0,10);
      if (card.transitStatus) {
        STATE.transitArchive.push({ id: cardKey, seller: card.transitData?.seller, date: new Date().toISOString() });
        card.transitStatus = null; card.transitData = null;
      }
      addRecentAction('✅ Получена карта', cardKey);
      saveState(); render(); overlay.remove();
    });
  }

  function showTransitForm(cardKey) {
    const card = STATE.cards[cardKey];
    if (!card) return;
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `
      <div class="dialog">
        <h4><span class="material-symbols-outlined">local_shipping</span> В путь</h4>
        <input id="sellerInput" placeholder="Продавец" style="width:100%; margin:4px 0; padding:8px; border-radius:12px; border:1px solid #E0E0E0;">
        <input id="priceInput" placeholder="Цена" style="width:100%; margin:4px 0; padding:8px; border-radius:12px; border:1px solid #E0E0E0;">
        <div style="margin:6px 0;">Статус:
          <button class="status-btn" data-status="ordered">🟡 Заказана</button>
          <button class="status-btn" data-status="paid">🟠 Оплачена</button>
          <button class="status-btn" data-status="shipped">🟢 Отправлена</button>
        </div>
        <button class="btn" id="saveTransit">Сохранить</button>
        <button class="btn small outline" id="cancelTransit">Отмена</button>
      </div>
    `;
    document.body.appendChild(overlay);
    let sel = 'ordered';
    overlay.querySelectorAll('.status-btn').forEach(b => b.addEventListener('click', () => { sel = b.dataset.status; }));
    overlay.querySelector('#saveTransit').addEventListener('click', () => {
      const seller = overlay.querySelector('#sellerInput').value.trim();
      if (!seller) return alert('Введите продавца');
      card.transitStatus = sel;
      card.transitData = { seller, price: overlay.querySelector('#priceInput').value, date: new Date().toISOString() };
      card.statusHistory = [{ status: sel, date: new Date().toISOString() }];
      addRecentAction('🚚 В путь', cardKey);
      saveState(); render(); overlay.remove();
    });
    overlay.querySelector('#cancelTransit').addEventListener('click', () => overlay.remove());
  }

  function renderWishlist() {
    setHeader('Вишлист');
    const html = STATE.wishlist.map(key => {
      const card = STATE.cards[key];
      if (!card) return '';
      const transit = card.transitStatus ? '<span class="material-symbols-outlined" style="font-size:0.9rem; color:#D3542B;">local_shipping</span>' : '';
      const imgStyle = getCardImageStyle(key);
      return `<div class="card-cell" data-card-key="${key}">
        <div style="width:45px; height:68px; border-radius:8px; ${imgStyle} background-size:cover; background-color:#F6F6F8; flex-shrink:0;"></div>
        <div style="flex:1;">${getCardDisplayName(key)} ${transit}</div>
      </div>`;
    }).join('');
    document.getElementById('mainContent').innerHTML = `<div class="card-grid">${html || 'Нет залайканных карт'}</div>`;
    document.querySelectorAll('.card-cell[data-card-key]').forEach(el => {
      el.addEventListener('click', () => showCardDetail(el.dataset.cardKey));
    });
  }

  function renderDuplicates() {
    setHeader('Дубликаты');
    let html = '';
    Object.entries(STATE.cards).forEach(([key, card]) => {
      if (key === '_init' || !card.dupes.length) return;
      card.dupes.forEach((d, i) => {
        const imgStyle = getCardImageStyle(key);
        html += `<div class="card-cell">
          <div style="width:45px; height:68px; border-radius:8px; ${imgStyle} background-size:cover; background-color:#F6F6F8; flex-shrink:0;"></div>
          <div>${getCardDisplayName(key)}<br>дубль ${i+1} · ${d.source||'-'} ${d.price||''}₽</div>
        </div>`;
      });
    });
    document.getElementById('mainContent').innerHTML = html || 'Нет дубликатов';
  }

  function renderTransit() {
    setHeader('В пути');
    const active = Object.entries(STATE.cards).filter(([k, c]) => c.transitStatus);
    let html = active.map(([key, card]) => {
      const statusColor = card.transitStatus === 'ordered' ? '#E65100' : card.transitStatus === 'paid' ? '#E65100' : '#1B5E20';
      const bgColor = card.transitStatus === 'ordered' ? '#FFF3E0' : card.transitStatus === 'paid' ? '#FFF3E0' : '#E8F5E9';
      const statusText = card.transitStatus === 'ordered' ? 'Заказана' : card.transitStatus === 'paid' ? 'Оплачена' : 'Отправлена';
      const days = Math.floor((Date.now() - new Date(card.transitData.date)) / 86400000);
      const imgStyle = getCardImageStyle(key);
      return `<div class="card-cell" data-transit-key="${key}">
        <div style="width:45px; height:68px; border-radius:8px; ${imgStyle} background-size:cover; background-color:#F6F6F8; flex-shrink:0;"></div>
        <div>
          <span style="background:${bgColor}; color:${statusColor}; border-radius:8px; padding:2px 6px; font-size:0.6rem;">${statusText}</span><br>
          ${getCardDisplayName(key)}<br>
          <span class="material-symbols-outlined" style="font-size:0.7rem;">person</span> ${card.transitData.seller}<br>
          ${days} дн.
          <button class="btn small change-status-btn" data-id="${key}" style="margin-top:4px; display:block;">Сменить статус</button>
        </div>
      </div>`;
    }).join('');
    html += '<h4 style="font-family:Lora; margin-top:12px;">Архив</h4>';
    html += STATE.transitArchive.map(a => {
      const imgStyle = getCardImageStyle(a.id);
      return `<div class="card-cell" style="opacity:0.7;">
        <div style="width:45px; height:68px; border-radius:8px; ${imgStyle} background-size:cover; background-color:#F6F6F8;"></div>
        <div>✅ ${getCardDisplayName(a.id)} — ${a.seller||'—'}</div>
      </div>`;
    }).join('');
    document.getElementById('mainContent').innerHTML = html || 'Нет активных заказов';
    document.querySelectorAll('[data-transit-key]').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('change-status-btn')) return;
        showTransitDetail(el.dataset.transitKey);
      });
    });
    document.querySelectorAll('.change-status-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        changeTransitStatus(btn.dataset.id);
      });
    });
  }

  function showTransitDetail(cardKey) {
    const card = STATE.cards[cardKey];
    if (!card?.transitData) return;
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `
      <div class="dialog">
        <h4>Заказ</h4>
        <div><span class="material-symbols-outlined">person</span> ${card.transitData.seller}</div>
        <div><span class="material-symbols-outlined">payments</span> ${card.transitData.price} ₽</div>
        <div>История: ${(card.statusHistory||[]).map(h => h.status).join(' → ')}</div>
        <button class="btn small" id="changeStatus"><span class="material-symbols-outlined">swap_horiz</span> Сменить статус</button>
        <button class="btn small outline" id="closeDetail">Закрыть</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('#closeDetail').addEventListener('click', () => overlay.remove());
    overlay.querySelector('#changeStatus').addEventListener('click', () => {
      overlay.remove();
      changeTransitStatus(cardKey);
    });
  }

  function changeTransitStatus(cardKey) {
    const card = STATE.cards[cardKey];
    if (!card) return;
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `
      <div class="dialog">
        <button class="status-btn" data-status="ordered">🟡 Заказана</button>
        <button class="status-btn" data-status="paid">🟠 Оплачена</button>
        <button class="status-btn" data-status="shipped">🟢 Отправлена</button>
        <button class="btn small outline" id="cancelStatus">Отмена</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelectorAll('.status-btn').forEach(b => {
      b.addEventListener('click', () => {
        card.statusHistory.push({ status: b.dataset.status, date: new Date().toISOString() });
        card.transitStatus = b.dataset.status;
        saveState(); render(); overlay.remove();
      });
    });
    overlay.querySelector('#cancelStatus').addEventListener('click', () => overlay.remove());
  }

  loadState();
  render();
</script>
</body>
</html>
